<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAA Stats Elite</title>

<style>
body { font-family: Arial; padding: 10px; }
button { margin: 5px; padding: 10px; }

/* PITCH */
.pitch {
  height: 320px;
  position: relative;
  background: #2e7d32;
  border: 2px solid white;
}

/* Halfway */
.pitch::before {
  content:"";
  position:absolute;
  top:50%;
  width:100%;
  height:2px;
  background:white;
}

/* 45 lines */
.pitch::after {
  content:"";
  position:absolute;
  top:25%;
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.7);
}

.line45b {
  position:absolute;
  top:75%;
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.7);
}

/* GOAL AREA BOXES */
.large-box {
  position:absolute;
  width:50%;
  left:25%;
  height:20%;
  border:2px solid white;
}
.large-top { top:0; }
.large-bottom { bottom:0; }

.small-box {
  position:absolute;
  width:30%;
  left:35%;
  height:10%;
  border:2px solid white;
}
.small-top { top:0; }
.small-bottom { bottom:0; }

/* ✅ CORRECT 40m ARC (single wide arc like real pitch) */
.arc-top {
  position:absolute;
  top:22%;
  left:50%;
  width:70%;
  height:120px;
  border:2px solid white;
  border-bottom:none;
  border-radius:50% / 100%;
  transform:translateX(-50%);
}

.arc-bottom {
  position:absolute;
  bottom:22%;
  left:50%;
  width:70%;
  height:120px;
  border:2px solid white;
  border-top:none;
  border-radius:50% / 100%;
  transform:translateX(-50%);
}

/* dots */
.dot {
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
}
.own { background:red; }
.opp { background:yellow; }

</style>
</head>

<body>

<h2 id="score">0-0</h2>
<h3 id="oppScore">Opp: 0-0</h3>

<div class="pitch" id="pitch">

  <!-- Boxes -->
  <div class="large-box large-top"></div>
  <div class="large-box large-bottom"></div>

  <div class="small-box small-top"></div>
  <div class="small-box small-bottom"></div>

  <!-- ✅ Correct arcs -->
  <div class="arc-top"></div>
  <div class="arc-bottom"></div>

  <div class="line45b"></div>

</div>

<br>

<h3>Own Score</h3>
<button onclick="addScore('point')">1pt</button>
<button onclick="addScore('goal')">Goal</button>
<button onclick="addScore('two')">2pt</button>

<h3>Opposition Score</h3>
<button onclick="addOppScore('point')">1pt</button>
<button onclick="addOppScore('goal')">Goal</button>
<button onclick="addOppScore('two')">2pt</button>

<br><br>

<label>
<input type="checkbox" id="oppToggle"> Track Opposition Shots
</label>

<br><br>

<button onclick="showStats()">View Stats</button>

<div id="stats" style="display:none">
<pre id="output"></pre>
<button onclick="back()">Back</button>
</div>

<script>

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

document.getElementById("pitch").onclick = function(e){

  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let isOpp = document.getElementById("oppToggle").checked;

  const dot = document.createElement("div");
  dot.className = "dot " + (isOpp ? "opp" : "own");
  dot.style.left = x+"px";
  dot.style.top = y+"px";
  e.target.appendChild(dot);

  if(isOpp){
    oppScore.p++;
    updateOpp();
  } else {
    score.p++;
    updateScore();
  }
};

// scoring
function addScore(type){
  if(type==="point") score.p++;
  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  updateScore();
}

function addOppScore(type){
  if(type==="point") oppScore.p++;
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  updateOpp();
}

// display
function updateScore(){
  document.getElementById("score").innerText =
    score.g + "-" + (score.p + score.two*2);
}

function updateOpp(){
  document.getElementById("oppScore").innerText =
    "Opp: " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

function showStats(){
  document.getElementById("stats").style.display="block";
  document.getElementById("output").innerText =
`Own: ${score.g}-${score.p + score.two*2}
Opp: ${oppScore.g}-${oppScore.p + oppScore.two*2}`;
}

function back(){
  document.getElementById("stats").style.display="none";
}

</script>

</body>
</html>
