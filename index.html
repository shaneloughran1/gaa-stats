<!DOCTYPE html>
<html>
<head>
<title>GAA Match Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;padding:10px;}

.row {display:flex; gap:30px;}
.column {flex:1;}

.pitch-rows {
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:12px;
}

.row1 {display:flex;justify-content:center;width:260px;}
.row3 {display:grid;grid-template-columns:1fr 1fr 1fr;width:260px;}
.row2 {display:grid;grid-template-columns:1fr 1fr;width:180px;gap:30px;}

.row1 input,.row2 input,.row3 input {
 width:70px;text-align:center;justify-self:center;
}

.subs input {display:block;margin:3px 0;}

button {padding:8px;margin:3px;}

.grid3 {display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.grid2 {display:grid;grid-template-columns:1fr 1fr;gap:6px;}
</style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<div class="row">

<div class="column">
<h3>Home</h3>
<div class="pitch-rows">
<div class="row1"><input placeholder="#1" onchange="lineup[1]=this.value"></div>

<div class="row3">
<input placeholder="#2" onchange="lineup[2]=this.value">
<input placeholder="#3" onchange="lineup[3]=this.value">
<input placeholder="#4" onchange="lineup[4]=this.value">
</div>

<div class="row3">
<input placeholder="#5" onchange="lineup[5]=this.value">
<input placeholder="#6" onchange="lineup[6]=this.value">
<input placeholder="#7" onchange="lineup[7]=this.value">
</div>

<div class="row2">
<input placeholder="#8" onchange="lineup[8]=this.value">
<input placeholder="#9" onchange="lineup[9]=this.value">
</div>

<div class="row3">
<input placeholder="#10" onchange="lineup[10]=this.value">
<input placeholder="#11" onchange="lineup[11]=this.value">
<input placeholder="#12" onchange="lineup[12]=this.value">
</div>

<div class="row3">
<input placeholder="#13" onchange="lineup[13]=this.value">
<input placeholder="#14" onchange="lineup[14]=this.value">
<input placeholder="#15" onchange="lineup[15]=this.value">
</div>
</div>

<h4>Subs</h4>
<div id="homeSubs" class="subs"></div>
</div>

<div class="column">
<h3>Opposition</h3>
<div class="pitch-rows">
<div class="row1"><input placeholder="#1" onchange="oppLineup[1]=this.value"></div>

<div class="row3">
<input placeholder="#2" onchange="oppLineup[2]=this.value">
<input placeholder="#3" onchange="oppLineup[3]=this.value">
<input placeholder="#4" onchange="oppLineup[4]=this.value">
</div>

<div class="row3">
<input placeholder="#5" onchange="oppLineup[5]=this.value">
<input placeholder="#6" onchange="oppLineup[6]=this.value">
<input placeholder="#7" onchange="oppLineup[7]=this.value">
</div>

<div class="row2">
<input placeholder="#8" onchange="oppLineup[8]=this.value">
<input placeholder="#9" onchange="oppLineup[9]=this.value">
</div>

<div class="row3">
<input placeholder="#10" onchange="oppLineup[10]=this.value">
<input placeholder="#11" onchange="oppLineup[11]=this.value">
<input placeholder="#12" onchange="oppLineup[12]=this.value">
</div>

<div class="row3">
<input placeholder="#13" onchange="oppLineup[13]=this.value">
<input placeholder="#14" onchange="oppLineup[14]=this.value">
<input placeholder="#15" onchange="oppLineup[15]=this.value">
</div>
</div>

<h4>Subs</h4>
<div id="awaySubs" class="subs"></div>
</div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

<h2 id="score">0-0 | 0-0</h2>
<h3 id="timer">1st Half – 00:00</h3>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="secondHalf()">2nd Half</button>

<h3>Select Player</h3>
<div id="playerButtons"></div>
<button onclick="startSub()">SUB</button>

<h3>Select Opp</h3>
<div id="oppButtons"></div>
<button onclick="startOppSub()">OPP SUB</button>

<h3>Home</h3>
<div class="grid3">
<button onclick="addScore('Goal')">Goal</button>
<button onclick="addScore('Point')">Point</button>
<button onclick="addScore('2pt')">2PT</button>
<button onclick="addWide()">Wide</button>
</div>

<h3>Kickouts</h3>
<div class="grid2">
<button onclick="kickout('won')">KO Won</button>
<button onclick="kickout('lost')">KO Lost</button>
</div>

<h3>Opponent</h3>
<div class="grid3">
<button onclick="oppScore('Goal')">Goal</button>
<button onclick="oppScore('Point')">Point</button>
<button onclick="oppScore('2pt')">2PT</button>
<button onclick="oppWide()">Wide</button>
</div>

<h3>Opp Kickouts</h3>
<div class="grid2">
<button onclick="oppKickout('won')">KO Won</button>
<button onclick="oppKickout('lost')">KO Lost</button>
</div>

<h3>Summary</h3>
<div id="summary"></div>

</div>

<script>

let lineup={},oppLineup={};
let selected="",selectedOpp="";

let playerStats={},oppPlayerStats={};

let homeScore={g:0,p:0,two:0};
let awayScore={g:0,p:0,two:0};

let stats={shots:0,wides:0,koWon:0,koLost:0};
let oppStats={wides:0,koWon:0,koLost:0};

let firstHalf={shots:0,scores:0,wides:0};
let secondHalfStats={shots:0,scores:0,wides:0};

let time=0,running=false,timerInt,half="1st Half";

let subMode=false,subOff=null;
let oppSubMode=false,oppSubOff=null;

/* subs */
for(let i=16;i<=30;i++){
 homeSubs.innerHTML+=`<input placeholder="#${i}">`;
 awaySubs.innerHTML+=`<input placeholder="#${i}">`;
}

function startMatch(){
 match.style.display="block";

 let p="",o="";
 for(let i=1;i<=30;i++){
  let dis=i>15?"disabled":"";
  p+=`<button onclick="selectPlayer(${i})" ${dis}>${i}</button>`;
  o+=`<button onclick="selectOpp(${i})" ${dis}>${i}</button>`;
 }
 playerButtons.innerHTML=p;
 oppButtons.innerHTML=o;

 updateScore();updateSummary();
}

function selectPlayer(n){
 let btn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);

 if(subMode){
  if(!subOff){subOff=n;return;}
  document.querySelector(`button[onclick="selectPlayer(${subOff})"]`).disabled=true;
  btn.disabled=false;
  subMode=false;
  return;
 }
 if(btn.disabled)return;
 selected=n;
}

function selectOpp(n){
 let btn=document.querySelector(`button[onclick="selectOpp(${n})"]`);

 if(oppSubMode){
  if(!oppSubOff){oppSubOff=n;return;}
  document.querySelector(`button[onclick="selectOpp(${oppSubOff})"]`).disabled=true;
  btn.disabled=false;
  oppSubMode=false;
  return;
 }
 if(btn.disabled)return;
 selectedOpp=n;
}

function startSub(){subMode=true;subOff=null;}
function startOppSub(){oppSubMode=true;oppSubOff=null;}

function startTimer(){
 if(running)return;
 running=true;
 timerInt=setInterval(()=>{
  time++;
  timer.innerText=half+" – "+("0"+Math.floor(time/60)).slice(-2)+":"+("0"+time%60).slice(-2);
 },1000);
}
function pauseTimer(){running=false;clearInterval(timerInt);}
function secondHalf(){half="2nd Half";time=0;}

/* scoring */
function addScore(t){
 if(!selected)return;

 if(!playerStats[selected]) playerStats[selected]={g:0,p:0,two:0};

 if(t==="Goal"){homeScore.g++;playerStats[selected].g++;}
 if(t==="Point"){homeScore.p++;playerStats[selected].p++;}
 if(t==="2pt"){homeScore.two++;playerStats[selected].two++;}

 stats.shots++;

 if(half==="1st Half"){firstHalf.shots++;firstHalf.scores++;}
 else{secondHalfStats.shots++;secondHalfStats.scores++;}

 updateScore();updateSummary();
}

function addWide(){
 stats.wides++;stats.shots++;

 if(half==="1st Half"){firstHalf.wides++;firstHalf.shots++;}
 else{secondHalfStats.wides++;secondHalfStats.shots++;}

 updateSummary();
}

function oppScore(t){
 if(!selectedOpp)return;

 if(!oppPlayerStats[selectedOpp]) oppPlayerStats[selectedOpp]={g:0,p:0,two:0};

 if(t==="Goal"){awayScore.g++;oppPlayerStats[selectedOpp].g++;}
 if(t==="Point"){awayScore.p++;oppPlayerStats[selectedOpp].p++;}
 if(t==="2pt"){awayScore.two++;oppPlayerStats[selectedOpp].two++;}

 selectedOpp="";
 updateScore();updateSummary();
}

function oppWide(){oppStats.wides++;updateSummary();}

/* kickouts */
function kickout(t){if(t==="won")stats.koWon++; else stats.koLost++; updateSummary();}
function oppKickout(t){if(t==="won")oppStats.koWon++; else oppStats.koLost++; updateSummary();}

function updateScore(){
 score.innerText=
 (home.value||"Home")+" "+homeScore.g+"-"+(homeScore.p+homeScore.two*2)
 +" | "+
 (away.value||"Opp")+" "+awayScore.g+"-"+(awayScore.p+awayScore.two*2);
}

function updateSummary(){

 let totalScores=homeScore.g+homeScore.p+homeScore.two;
 let conversion=stats.shots?((totalScores/stats.shots)*100).toFixed(1):0;

 let koTotal=stats.koWon+stats.koLost;
 let koPerc=koTotal?((stats.koWon/koTotal)*100).toFixed(1):0;

 let oppKoTotal=oppStats.koWon+oppStats.koLost;
 let oppKoPerc=oppKoTotal?((oppStats.koWon/oppKoTotal)*100).toFixed(1):0;

 summary.innerHTML=
 "<b>TOTAL</b><br>"+
 "Shots:"+stats.shots+" Scores:"+totalScores+" Wides:"+stats.wides+"<br>"+
 "Conversion:"+conversion+"%<br><br>"+

 "<b>1st Half</b><br>"+
 "Shots:"+firstHalf.shots+" Scores:"+firstHalf.scores+" Wides:"+firstHalf.wides+"<br><br>"+

 "<b>2nd Half</b><br>"+
 "Shots:"+secondHalfStats.shots+" Scores:"+secondHalfStats.scores+" Wides:"+secondHalfStats.wides+"<br><br>"+

 "<b>KICKOUTS</b><br>"+
 "Home:"+koPerc+"% Opp:"+oppKoPerc+"%";
}

</script>
