
<!DOCTYPE html>
<htmlAA Match Stats</title><html>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial;padding:10px;}

.row {display:flex; gap:30px;}
.column {flex:1;}

.pitch-rows {
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:10px;
}

.row1, .row2, .row3 {display:flex; justify-content:center; gap:10px;}

input {
 width:60px;
 text-align:center;
}

/* match area hidden initially */
#match {display:none;}

</style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<div class="row">

<div class="column">
<h3>Home</h3>

<div class="pitch-rows">
<div class="row1">
<input onclick="selectPlayer(1)" onchange="lineup[1]=this.value" placeholder="#1">
</div>

<div class="row3">
<input onclick="selectPlayer(2)" onchange="lineup[2]=this.value" placeholder="#2">
<input onclick="selectPlayer(3)" onchange="lineup[3]=this.value" placeholder="#3">
<input onclick="selectPlayer(4)" onchange="lineup[4]=this.value" placeholder="#4">
</div>

<div class="row3">
<input onclick="selectPlayer(5)" onchange="lineup[5]=this.value" placeholder="#5">
<input onclick="selectPlayer(6)" onchange="lineup[6]=this.value" placeholder="#6">
<input onclick="selectPlayer(7)" onchange="lineup[7]=this.value" placeholder="#7">
</div>

<div class="row2">
<input onclick="selectPlayer(8)" onchange="lineup[8]=this.value" placeholder="#8">
<input onclick="selectPlayer(9)" onchange="lineup[9]=this.value" placeholder="#9">
</div>

<div class="row3">
<input onclick="selectPlayer(10)" onchange="lineup[10]=this.value" placeholder="#10">
<input onclick="selectPlayer(11)" onchange="lineup[11]=this.value" placeholder="#11">
<input onclick="selectPlayer(12)" onchange="lineup[12]=this.value" placeholder="#12">
</div>

<div class="row3">
<input onclick="selectPlayer(13)" onchange="lineup[13]=this.value" placeholder="#13">
<input onclick="selectPlayer(14)" onchange="lineup[14]=this.value" placeholder="#14">
<input onclick="selectPlayer(15)" onchange="lineup[15]=this.value" placeholder="#15">
</div>
</div>

</div>

<div class="column">
<h3>Opposition</h3>

<div class="pitch-rows">
<div class="row1">
<input onclick="selectOpp(1)" onchange="oppLineup[1]=this.value" placeholder="#1">
</div>

<div class="row3">
<input onclick="selectOpp(2)" onchange="oppLineup[2]=this.value" placeholder="#2">
<input onclick="selectOpp(3)" onchange="oppLineup[3]=this.value" placeholder="#3">
<input onclick="selectOpp(4)" onchange="oppLineup[4]=this.value" placeholder="#4">
</div>

<div class="row3">
<input onclick="selectOpp(5)" onchange="oppLineup[5]=this.value" placeholder="#5">
<input onclick="selectOpp(6)" onchange="oppLineup[6]=this.value" placeholder="#6">
<input onclick="selectOpp(7)" onchange="oppLineup[7]=this.value" placeholder="#7">
</div>

<div class="row2">
<input onclick="selectOpp(8)" onchange="oppLineup[8]=this.value" placeholder="#8">
<input onclick="selectOpp(9)" onchange="oppLineup[9]=this.value" placeholder="#9">
</div>

<div class="row3">
<input onclick="selectOpp(10)" onchange="oppLineup[10]=this.value" placeholder="#10">
<input onclick="selectOpp(11)" onchange="oppLineup[11]=this.value" placeholder="#11">
<input onclick="selectOpp(12)" onchange="oppLineup[12]=this.value" placeholder="#12">
</div>

<div class="row3">
<input onclick="selectOpp(13)" onchange="oppLineup[13]=this.value" placeholder="#13">
<input onclick="selectOpp(14)" onchange="oppLineup[14]=this.value" placeholder="#14">
<input onclick="selectOpp(15)" onchange="oppLineup[15]=this.value" placeholder="#15">
</div>
</div>

</div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match">

<h2 id="score">0-0 | 0-0</h2>

<h3>Home</h3>
<button onclick="addScore('Goal')">Goal</button>
<button onclick="addScore('Point')">Point</button>
<button onclick="addWide()">Wide</button>

<h3>Opp</h3>
<button onclick="oppScore('Goal')">Goal</button>
<button onclick="oppScore('Point')">Point</button>
<button onclick="oppWide()">Wide</button>

<h3>Summary</h3>
<div id="summary"></div>

</div>

<script>

let lineup={}, oppLineup={};
let selected="", selectedOpp="";

let playerStats={}, oppPlayerStats={};

let homeScore={g:0,p:0};
let awayScore={g:0,p:0};

let stats={shots:0,wides:0};
let oppStats={wides:0};

function startMatch(){
 document.getElementById("match").style.display = "block";
}

function selectPlayer(n){
 selected = n;
}

function selectOpp(n){
 selectedOpp = n;
}

function addScore(t){

 if(!selected) return;

 if(!playerStats[selected])
  playerStats[selected]={g:0,p:0};

 if(t==="Goal"){homeScore.g++;playerStats[selected].g++;}
 if(t==="Point"){homeScore.p++;playerStats[selected].p++;}

 stats.shots++;
 updateScore();
 updateSummary();
}

function addWide(){
 stats.wides++;
 stats.shots++;
 updateSummary();
}

function oppScore(t){

 if(!selectedOpp) return;

 if(!oppPlayerStats[selectedOpp])
  oppPlayerStats[selectedOpp]={g:0,p:0};

 if(t==="Goal"){awayScore.g++;oppPlayerStats[selectedOpp].g++;}
 if(t==="Point"){awayScore.p++;oppPlayerStats[selectedOpp].p++;}

 updateScore();
 updateSummary();
}

function oppWide(){
 oppStats.wides++;
 updateSummary();
}

function updateScore(){
 document.getElementById("score").innerText =
 (home.value||"Home")+" "+homeScore.g+"-"+homeScore.p+
 " | "+
 (away.value||"Opp")+" "+awayScore.g+"-"+awayScore.p;
}

function updateSummary(){

 let homeTxt="";
 let oppTxt="";

 Object.entries(playerStats).forEach(([n,s])=>{
  homeTxt += `${lineup[n]||"#"+n} – ${s.g}-${s.p}<br>`;
 });

 Object.entries(oppPlayerStats).forEach(([n,s])=>{
  oppTxt += `${oppLineup[n]||"#"+n} – ${s.g}-${s.p}<br>`;
 });

 document.getElementById("summary").innerHTML =
 "Shots:"+stats.shots+
 " Wides:"+stats.wides+
 " (Opp:"+oppStats.wides+")<br><br>"+
 "<b>HOME</b><br>"+homeTxt+
 "<br><b>OPP</b><br>"+oppTxt;
}

</script>

</body>
</html>
<head>
