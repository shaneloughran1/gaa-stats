<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    #pitch {
      width: 100%;
      height: 320px;
      background: green;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: red;
    }

    button { margin: 3px; padding: 8px; }
  </style>

</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <!-- ✅ SCORE -->
  <div id="score" style="font-weight:bold; float:right;"></div>

  <!-- ✅ TIMER -->
  <h2 id="timer">00:00</h2>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>

  <!-- ✅ PLAYER SELECT -->
  <h3>Select Player</h3>
  <div id="playerButtons"></div>

  <!-- ✅ PITCH -->
  <div id="pitch" onclick="logShot(event)">

    <!-- ARC (visual only for now) -->
    <svg style="position:absolute;top:90px;width:100%;height:120px;">
      <path d="M20,0 Q200,140 380,0" stroke="white" fill="none" stroke-width="2"/>
    </svg>

  </div>

  <!-- ✅ HOME ACTIONS -->
  <h3>Home</h3>
  <button onclick="add('goal')">Goal</button>
  <button onclick="add('two')">2pt</button>
  <button onclick="add('point')">1pt</button>
  <button onclick="undo()">Undo</button>

  <!-- ✅ OPP ACTIONS -->
  <h3>Opposition</h3>
  <button onclick="opp('goal')">Opp Goal</button>
  <button onclick="opp('two')">Opp 2pt</button>
  <button onclick="opp('point')">Opp 1pt</button>

  <h4 id="last"></h4>

</div>

<script>

// DATA
let lineup = {};
let selected = "";
let time = 0;
let running = false;
let timer;

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let lastEvent = null;

// CREATE PLAYER INPUTS
const playersDiv = document.getElementById("players");

for (let i=1;i<=15;i++){
  playersDiv.innerHTML += `
    <input placeholder="#${i}" onchange="setPlayer(${i}, this.value)"><br>
  `;
}

function setPlayer(num,name){
  lineup[num] = name;
}

// START MATCH
function startMatch(){

  document.getElementById("match").style.display = "block";

  document.getElementById("playerButtons").innerHTML =
    Object.keys(lineup).map(n =>
      `<button onclick="selectPlayer(${n})">${n}</button>`
    ).join("");
}

// SELECT PLAYER
function selectPlayer(n){
  selected = n;
}

// ADD HOME EVENT
function add(type){

  if(!selected) return;

  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  if(type==="point") score.p++;

  lastEvent = {type, team:"home"};

  document.getElementById("last").innerText =
    lineup[selected] + " - " + type;

  updateScore();
}

// OPP EVENT
function opp(type){

  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  if(type==="point") oppScore.p++;

  lastEvent = {type, team:"opp"};

  updateScore();
}

// UNDO
function undo(){

  if(!lastEvent) return;

  if(lastEvent.team==="home"){
    if(lastEvent.type==="goal") score.g--;
    if(lastEvent.type==="two") score.two--;
    if(lastEvent.type==="point") score.p--;
  }

  if(lastEvent.team==="opp"){
    if(lastEvent.type==="goal") oppScore.g--;
    if(lastEvent.type==="two") oppScore.two--;
    if(lastEvent.type==="point") oppScore.p--;
  }

  updateScore();
}

// UPDATE SCORE
function updateScore(){

  document.getElementById("score").innerText =
    document.getElementById("home").value + ": " +
    score.g + "-" + (score.p + score.two*2)
    + "   |   " +
    document.getElementById("away").value + ": " +
    oppScore.g + "-" + (oppScore.p + oppScore.two*2);

}

// TIMER
function start(){
  if(running) return;
  running = true;

  timer = setInterval(()=>{
    time++;
    const m = Math.floor(time/60).toString().padStart(2,"0");
    const s = (time%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText = m + ":" + s;
  },1000);
}

function pause(){
  running = false;
  clearInterval(timer);
}

// 📍 SHOT TRACKING
function logShot(e){

  if(!selected) return;

  const pitch = document.getElementById("pitch");
  const rect = pitch.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";

  pitch.appendChild(dot);

  console.log("Shot:", lineup[selected], x, y);
}

</script>

</body>
</html>
