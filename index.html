<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }
    #pitch {
      width: 100%;
      height: 420px;
      background: #2e7d32;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot { position:absolute;width:8px;height:8px;border-radius:50%;background:red; }

    button { margin:4px; padding:10px; }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    .grid2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold; float:right;"></div>

  <h2 id="timer">00:00</h2>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <h4 id="selected"></h4>

  <!-- ✅ PITCH -->
  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>
    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M5,0 Q50,80 95,0" stroke="white" stroke-width="1.5" fill="none"/>
    </svg>

    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>
  </div>

  <!-- HOME -->
  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <!-- ✅ KICKOUTS BACK -->
  <h3>Kickouts</h3>
  <div class="grid2">
    <button onclick="kickout('won')">KO Won</button>
    <button onclick="kickout('lost')">KO Lost</button>
  </div>

  <!-- OPP -->
  <h3>Opposition</h3>
  <div class="grid3">
    <button onclick="opp('Goal')">Goal</button>
    <button onclick="opp('2pt')">2PT</button>
    <button onclick="opp('Point')">1PT</button>
  </div>

  <!-- QUICK -->
  <h3>Quick Events</h3>
  <div class="grid3">
    <button onclick="quick('Won Ball')">Won Ball</button>
    <button onclick="quick('Lost Ball')">Lost Ball</button>
    <button onclick="wide()">Wide</button>
    <button onclick="quick('Mark')">Mark</button>
    <button onclick="quick('Foul Won')">Foul Won</button>
    <button onclick="quick('Foul Conceded')">Foul</button>
  </div>

  <button onclick="undo()">Undo</button>

  <!-- SUMMARY -->
  <h3>Match Summary</h3>
  <div id="summary"></div>

  <h3 id="last"></h3>

</div>

<script>

let lineup = {};
let selected = "";

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let stats = {
  shots:0,
  wides:0,
  koWon:0,
  koLost:0
};

let playerStats = {};

let lastEvent = null;

// PLAYERS
for(let i=1;i<=15;i++){
  players.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>`;
}

function startMatch(){
  match.style.display="block";

  playerButtons.innerHTML = Object.keys(lineup).map(n =>
    `<button onclick="selectPlayer(${n})">${n}</button>`
  ).join("");

  updateScore();
  updateSummary();
}

function selectPlayer(n){
  selected = n;
  selectedDisplay.textContent = "#"+n+" - "+lineup[n];
}

// SCORE
function add(type){
  if(!selected) return;

  if(!playerStats[selected]){
    playerStats[selected] = {g:0,p:0,two:0};
  }

  if(type==="Goal"){ score.g++; stats.shots++; playerStats[selected].g++; }
  if(type==="2pt"){ score.two++; stats.shots++; playerStats[selected].two++; }
  if(type==="Point"){ score.p++; stats.shots++; playerStats[selected].p++; }

  last.innerText = "✅ "+lineup[selected]+" - "+type;
  lastEvent = {type,team:"home",player:selected};

  updateScore();
  updateSummary();
}

// ✅ KICKOUTS FIXED
function kickout(type){

  if(type==="won") stats.koWon++;
  if(type==="lost") stats.koLost++;

  last.innerText = "⚪ KO " + type;
  lastEvent = {type, team:"ko"};

  updateSummary();
}

// WIDE
function wide(){
  stats.wides++;
  last.innerText="⚪ Wide";
  lastEvent={type:"wide",team:"wide"};
  updateSummary();
}

// QUICK
function quick(type){
  last.innerText="⚡ "+type;
}

// OPP
function opp(type){
  if(type==="Goal") oppScore.g++;
  if(type==="2pt") oppScore.two++;
  if(type==="Point") oppScore.p++;

  last.innerText="🔴 Opp - "+type;

  updateScore();
  updateSummary();
}

// UNDO
function undo(){
  if(!lastEvent) return;

  if(lastEvent.team==="ko"){
    if(lastEvent.type==="won") stats.koWon--;
    if(lastEvent.type==="lost") stats.koLost--;
  }

  if(lastEvent.team==="wide"){
    stats.wides--;
  }

  updateSummary();
}

// SCORE DISPLAY
function updateScore(){
  document.getElementById("score").textContent =
    home.value + ": " + score.g + "-" + (score.p + score.two*2)
    + " | " +
    away.value + ": " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

// ✅ SUMMARY WITH EVERYTHING
function updateSummary(){

  let scorers = Object.entries(playerStats).map(([num, s])=>{
    let total = s.g*3 + s.p + s.two*2;
    return {name: lineup[num], g:s.g, p:s.p, total};
  });

  scorers.sort((a,b)=>b.total - a.total);

  let list = scorers.map(p =>
    `${p.name} – ${p.g}-${p.p} (${p.total})`
  ).join("<br>");

  let totalKO = stats.koWon + stats.koLost;
  let koPerc = totalKO ? ((stats.koWon/totalKO)*100).toFixed(1) : 0;

  summary.innerHTML =
    "Shots: "+stats.shots+"<br>"+
    "Wides: "+stats.wides+"<br><br>"+
    "KO Won: "+stats.koWon+"<br>"+
    "KO Lost: "+stats.koLost+"<br>"+
    "KO %: "+koPerc+"%<br><br>"+
    "<b>Top Scorers:</b><br>"+list;
}

</script>

</body>
</html>
