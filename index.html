<h1 style="color:red;">✅ VERSION LIVE NOW</h1>
<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding:10px; }

    button { padding:10px; margin:4px; }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    /* ✅ PITCH */
    #pitch {
      width:100%;
      height:400px;
      background:#2e7d32;
      position:relative;
      border:2px solid white;
      margin-top:10px;
    }

    .line {
      position:absolute;
      width:100%;
      height:2px;
      background:white;
    }

    .dot {
      position:absolute;
      width:8px;
      height:8px;
      background:red;
      border-radius:50%;
    }

  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="team" placeholder="Your Team"><br><br>
<input id="opp" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <!-- ✅ SCORE -->
  <h3 id="score">0-0 | 0-0</h3>

  <!-- ✅ TIMER -->
  <h2 id="timer">1st Half – 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="secondHalf()">Second Half</button>

  <!-- ✅ PLAYER SELECT -->
  <h3>Select Player</h3>
  <div id="playerButtons"></div>

  <!-- ✅ PITCH -->
  <h3>Pitch</h3>
  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:25%"></div>
    <div class="line" style="top:50%"></div>
    <div class="line" style="top:75%"></div>
  </div>

  <!-- ✅ SCORING -->
  <h3>Score</h3>
  <div class="grid3">
    <button onclick="addScore('Goal')">Goal</button>
    <button onclick="addScore('2pt')">2PT</button>
    <button onclick="addScore('Point')">1PT</button>
  </div>

  <!-- ✅ SUMMARY -->
  <h3>Summary</h3>
  <div id="summary"></div>

  <!-- ✅ LAST EVENT -->
  <h4 id="last"></h4>

</div>

<script>

let lineup = {};
let selected = "";

let score = {g:0, p:0, two:0};

let stats = {shots:0};

let time = 0;
let running = false;
let timerInt;
let half = "1st Half";

/* ✅ PLAYERS */
for(let i=1;i<=15;i++){
  players.innerHTML +=
    `<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>`;
}

/* ✅ START MATCH */
function startMatch(){
  document.getElementById("match").style.display="block";

  let btns="";
  for(let i=1;i<=15;i++){
    btns += `<button onclick="select(${i})">${i}</button>`;
  }
  playerButtons.innerHTML = btns;

  updateScore();
  updateSummary();
}

/* ✅ TIMER */
function startTimer(){
  if(running) return;
  running=true;

  timerInt = setInterval(()=>{
    time++;
    let m = Math.floor(time/60).toString().padStart(2,"0");
    let s = (time%60).toString().padStart(2,"0");
    timer.innerText = half + " – " + m + ":" + s;
  },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(timerInt);
}

function secondHalf(){
  half = "2nd Half";
  time = 0;
}

/* ✅ SELECT PLAYER */
function select(n){
  selected = n;
}

/* ✅ SCORE */
function addScore(type){

  if(!selected) return;

  stats.shots++;

  if(type==="Goal") score.g++;
  if(type==="2pt") score.two++;
  if(type==="Point") score.p++;

  let name = lineup[selected] || "#"+selected;

  document.getElementById("last").innerText =
    name + " - " + type;

  updateScore();
  updateSummary();
}

/* ✅ SCORE DISPLAY */
function updateScore(){

  document.getElementById("score").innerText =
    document.getElementById("team").value + ": " +
    score.g + "-" + (score.p + score.two*2)
    + " | " +
    document.getElementById("opp").value + ": 0-0";
}

/* ✅ SUMMARY */
function updateSummary(){

  document.getElementById("summary").innerText =
    "Shots: " + stats.shots;
}

/* ✅ SHOT TRACKING */
function logShot(e){

  if(!selected) return;

  let rect = pitch.getBoundingClientRect();

  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
