<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    #pitch {
      width: 100%;
      height: 420px;
      background: #2e7d32;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot {
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      background:red;
    }

    button { margin:4px; padding:10px; }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    .grid2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Starting 15</h3>
<div id="players"></div>

<h3>Substitutes</h3>
<div id="subs"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold; float:right;"></div>

  <h2 id="timer">1st Half тАУ 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="toggleHalf()">Second Half</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <button onclick="startSub()">SUB</button>
  <h4 id="selected"></h4>

  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>
    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M5,0 Q50,80 95,0" stroke="white" stroke-width="1.5" fill="none"/>
    </svg>

    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>
  </div>

  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <h3>Kickouts</h3>
  <div class="grid2">
    <button onclick="kickout('won')">KO Won</button>
    <button onclick="kickout('lost')">KO Lost</button>
  </div>

  <h3>Opposition</h3>
  <div class="grid3">
    <button onclick="opp('Goal')">Goal</button>
    <button onclick="opp('2pt')">2PT</button>
    <button onclick="opp('Point')">1PT</button>
  </div>

  <h3>Quick Events</h3>
  <div class="grid3">
    <button onclick="quick('Won Ball')">Won Ball</button>
    <button onclick="quick('Lost Ball')">Lost Ball</button>
    <button onclick="wide()">Wide</button>
    <button onclick="quick('Mark')">Mark</button>
    <button onclick="quick('Foul Won')">Foul Won</button>
    <button onclick="quick('Foul Conceded')">Foul</button>
  </div>

  <h3>Match Summary</h3>
  <div id="summary"></div>

  <h3 id="last"></h3>

</div>

<script>

// DATA
let lineup = {};
let selected = "";

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let stats = {shots:0,wides:0,koWon:0,koLost:0};
let stats1 = {shots:0,wides:0,koWon:0,koLost:0};
let stats2 = {shots:0,wides:0,koWon:0,koLost:0};

let playerStats = {};

let half="1st Half";
let time=0;
let running=false;
let interval;

// тЬЕ SUB SYSTEM
let subMode = false;
let subOff = null;

// SETUP PLAYERS
for(let i=1;i<=15;i++){
  players.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>`;
}

for(let i=16;i<=30;i++){
  subs.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>`;
}

function buildButtons(){
  playerButtons.innerHTML = Object.keys(lineup).map(n=>{
    let starter = n <= 15;
    return `<button onclick="selectPlayer(${n})" ${!starter ? 'disabled style="background:#eee;"' : ''}>${n}</button>`;
  }).join("");
}

function startMatch(){
  match.style.display="block";
  buildButtons();
  updateScore();
  updateSummary();
}

// TIMER
function startTimer(){
  if(running)return;
  running=true;
  interval=setInterval(()=>{ time++; updateTimer(); },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(interval);
}

function toggleHalf(){
  half="2nd Half";
  time=0;
  updateTimer();
}

function updateTimer(){
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  timer.innerText=half+" тАУ "+m+":"+s;
}

function getTime(){
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  return half+" "+m+":"+s;
}

// тЬЕ SUB FLOW
function startSub(){
  subMode=true;
  subOff=null;
  last.innerText="ЁЯФБ Select player OFF";
}

function selectPlayer(n){

  if(subMode){

    if(!subOff){
      subOff=n;
      last.innerText="ЁЯФБ Select player ON";
      return;
    }

    let subOn=n;

    let offBtn=document.querySelector(`button[onclick="selectPlayer(${subOff})"]`);
    let onBtn=document.querySelector(`button[onclick="selectPlayer(${subOn})"]`);

    if(offBtn){ offBtn.disabled=true; offBtn.style.background="#ccc"; }
    if(onBtn){ onBtn.disabled=false; onBtn.style.background=""; }

    last.innerText=`ЁЯФБ ${getTime()} тАУ #${subOff} OFF тЖТ #${subOn} ON`;

    subMode=false;
    return;
  }

  selected=n;
  selectedDisplay.innerText="#"+n+" - "+lineup[n];
}

// HOME SCORE
function add(type){
  if(!selected)return;

  if(!playerStats[selected]) playerStats[selected]={g:0,p:0,two:0};

  let h = half==="1st Half"?stats1:stats2;

  if(type==="Goal"){score.g++;stats.shots++;h.shots++;playerStats[selected].g++;}
  if(type==="2pt"){score.two++;stats.shots++;h.shots++;playerStats[selected].two++;}
  if(type==="Point"){score.p++;stats.shots++;h.shots++;playerStats[selected].p++;}

  last.innerText=`тЬЕ ${getTime()} тАУ ${lineup[selected]} - ${type}`;
  updateScore();updateSummary();
}

function kickout(t){
  let h = half==="1st Half"?stats1:stats2;
  if(t==="won"){stats.koWon++;h.koWon++;}
  if(t==="lost"){stats.koLost++;h.koLost++;}
  last.innerText=`тЪк ${getTime()} тАУ KO ${t}`;
  updateSummary();
}

function wide(){
  let h = half==="1st Half"?stats1:stats2;
  stats.wides++;h.wides++;
  last.innerText=`тЪк ${getTime()} тАУ Wide`;
  updateSummary();
}

function quick(t){
  last.innerText=`тЪб ${getTime()} тАУ ${t}`;
}

function opp(type){
  if(type==="Goal")oppScore.g++;
  if(type==="2pt")oppScore.two++;
  if(type==="Point")oppScore.p++;
  last.innerText=`ЁЯФ┤ ${getTime()} тАУ Opp ${type}`;
  updateScore();
}

function updateScore(){
  score.innerText =
    home.value+": "+score.g+"-"+(score.p+score.two*2)
    +" | "+
    away.value+": "+oppScore.g+"-"+(oppScore.p+oppScore.two*2);
}

// SUMMARY (unchanged logic)
function updateSummary(){
  let totalKO=stats.koWon+stats.koLost;
  let koPerc=totalKO?((stats.koWon/totalKO)*100).toFixed(1):0;

  let scorers = Object.entries(playerStats).map(([num,s])=>{
    let total = s.g*3 + s.p + s.two*2;
    return {name:lineup[num],g:s.g,p:s.p,two:s.two,total};
  });

  scorers.sort((a,b)=>b.total-a.total);

  let list=scorers.map(p=>{
    let line=`${p.g}-${p.p}`;
    if(p.two>0) line+=` (${p.two}x2pt)`;
    return `${p.name} тАУ ${line} (${p.total})`;
  }).join("<br>");

  summary.innerHTML=
    "<b>Overall</b><br>"+
    "Shots: "+stats.shots+"<br>"+
    "Wides: "+stats.wides+"<br>"+
    "KO Won: "+stats.koWon+"<br>"+
    "KO Lost: "+stats.koLost+"<br>"+
    "KO %: "+koPerc+"%<br><br>"+

    "<b>Top Scorers</b><br>"+list;
}

</script>

</body>
</html>
