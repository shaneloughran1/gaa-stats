<!DOCTYPE html><!DOCTYPE<head>
  <title>GAA Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold;"></div>

  <h2 id="timer">00:00</h2>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>

  <h3>Home</h3>
  <button onclick="add('goal')">Goal</button>
  <button onclick="add('two')">2pt</button>
  <button onclick="add('point')">1pt</button>

  <h3>Opposition</h3>
  <button onclick="opp('goal')">Opp Goal</button>
  <button onclick="opp('two')">Opp 2pt</button>
  <button onclick="opp('point')">Opp 1pt</button>

  <h4 id="last"></h4>

</div>

<script>

let lineup = {};
let selected = "";
let time = 0;
let running = false;

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let timer;

const playersDiv = document.getElementById("players");

// create inputs
for(let i=1;i<=15;i++){
  playersDiv.innerHTML += `<input placeholder="#${i}" onchange="setPlayer(${i}, this.value)"><br>`;
}

function setPlayer(num,name){
  lineup[num]=name;
}

function startMatch(){
  document.getElementById("match").style.display="block";

  document.getElementById("playerButtons").innerHTML =
    Object.keys(lineup).map(n =>
      `<button onclick="selectPlayer(${n})">${n}</button>`
    ).join("");
}

function selectPlayer(n){
  selected = n;
}

function add(type){
  if(!selected) return;

  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  if(type==="point") score.p++;

  document.getElementById("last").innerText =
    lineup[selected] + " - " + type;

  updateScore();
}

function opp(type){
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  if(type==="point") oppScore.p++;

  updateScore();
}

function updateScore(){
  document.getElementById("score").innerText =
    document.getElementById("home").value + ": " +
    score.g + "-" + (score.p + score.two*2)
    + " | " +
    document.getElementById("away").value + ": " +
    oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

function start(){
  running=true;
  timer=setInterval(()=>{
    time++;
    const m=Math.floor(time/60).toString().padStart(2,"0");
    const s=(time%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText=m+":"+s;
  },1000);
}

function pause(){
  clearInterval(timer);
}

</script>

</body>
</html>
