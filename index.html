<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAA Stats Elite</title>

<style>
body { font-family: Arial; padding: 10px; }
button, select, input { margin: 5px; padding: 12px; font-size: 16px; }
.pitch { height: 220px; background: green; position: relative; color:white; text-align:center; }
.dot { position:absolute;width:8px;height:8px;background:red;border-radius:50%; }
</style>

</head>

<body>

<h2 id="teams"></h2>

<div id="setup">
<input id="home" placeholder="Home Team"><br>
<input id="away" placeholder="Opponent"><br>

<h3>Lineup</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>
</div>

<div id="match" style="display:none">

<h2 id="score">0-0</h2>

<select id="playerSelect">
<option>Select Player</option>
</select>

<div class="pitch" id="pitch">Tap for point</div>

<br>

<button onclick="addScore('goal')">Goal</button>
<button onclick="addScore('two')">2pt</button>

<h3>Own Kickouts</h3>
<button onclick="kickout('own','short','won')">Short Won</button>
<button onclick="kickout('own','short','lost')">Short Lost</button>
<button onclick="kickout('own','long','won')">Long Won</button>
<button onclick="kickout('own','long','lost')">Long Lost</button>

<h3>Opposition Kickouts</h3>
<button onclick="kickout('opp','short','won')">Press Won</button>
<button onclick="kickout('opp','short','lost')">Press Lost</button>
<button onclick="kickout('opp','long','won')">Long Won</button>
<button onclick="kickout('opp','long','lost')">Long Lost</button>

<br><br>

<button onclick="showStats()">View Stats</button>
<button onclick="saveMatch()">Save Match</button>

</div>

<div id="stats" style="display:none">

<h3>Player Stats</h3>
<pre id="playerStats"></pre>

<h3>Scoring</h3>
<pre id="scoreStats"></pre>

<h3>Kickouts</h3>
<pre id="kickStats"></pre>

<h3>Insights</h3>
<pre id="insight"></pre>

<button onclick="back()">Back</button>

</div>

<script>

let lineup = {};
let events = [];
let kickouts = [];
let score = {g:0,p:0,two:0};

const playersDiv = document.getElementById("players");

// ✅ PITCH-STYLE LINEUP (CORRECT GAA STRUCTURE)
playersDiv.innerHTML = `

<div style="text-align:center">

  <input placeholder="#1 (GK)" id="p1"><br><br>

  <input placeholder="#2" id="p2">
  <input placeholder="#3" id="p3">
  <input placeholder="#4" id="p4"><br><br>

  <input placeholder="#5" id="p5">
  <input placeholder="#6" id="p6">
  <input placeholder="#7" id="p7"><br><br>

  <input placeholder="#8" id="p8">
  <input placeholder="#9" id="p9"><br><br>

  <input placeholder="#10" id="p10">
  <input placeholder="#11" id="p11">
  <input placeholder="#12" id="p12"><br><br>

  <input placeholder="#13" id="p13">
  <input placeholder="#14" id="p14">
  <input placeholder="#15" id="p15">

</div>

`;

// start match
function startMatch(){
  const home = document.getElementById("home").value;
  const away = document.getElementById("away").value;

  document.getElementById("teams").innerText = home + " vs " + away;

  const select = document.getElementById("playerSelect");

  for(let i=1;i<=15;i++){
    const name = document.getElementById("p"+i).value;
    if(name){
      lineup[i]=name;
      select.innerHTML += `<option value="${i}">#${i} ${name}</option>`;
    }
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("match").style.display="block";
}

// pitch click = point
document.getElementById("pitch").onclick = function(e){

  const jersey = document.getElementById("playerSelect").value;
  if(!jersey) return alert("Select player first");

  score.p++;
  updateScore();

  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = x+"px";
  dot.style.top = y+"px";
  e.target.appendChild(dot);

  events.push({player: lineup[jersey], type:"point"});
};

// goal / 2pt
function addScore(type){

  const jersey = document.getElementById("playerSelect").value;
  if(!jersey) return alert("Select player first");

  if(type==="goal") score.g++;
  if(type==="two") score.two++;

  updateScore();

  events.push({player: lineup[jersey], type:type});
}

// update score
function updateScore(){
  document.getElementById("score").innerText =
    score.g + "-" + (score.p + score.two*2);
}

// kickouts
function kickout(team,type,result){
  kickouts.push({team,type,result});
}

// stats
function showStats(){

  document.getElementById("match").style.display="none";
  document.getElementById("stats").style.display="block";

  let stats = {};

  events.forEach(e=>{
    if(!stats[e.player]) stats[e.player]={shots:0,score:0};

    stats[e.player].shots++;

    if(e.type==="point") stats[e.player].score+=1;
    if(e.type==="two") stats[e.player].score+=2;
    if(e.type==="goal") stats[e.player].score+=3;
  });

  let playerText="";
  Object.entries(stats).forEach(([p,s])=>{
    playerText += `${p}: Shots ${s.shots}, Score ${s.score}\n`;
  });

  document.getElementById("playerStats").innerText = playerText;

  let shots = events.length;
  let totalScore = score.p + score.two*2 + score.g*3;
  let conv = shots ? (totalScore/(shots*3)*100).toFixed(1):0;

  document.getElementById("scoreStats").innerText =
`Shots: ${shots}
Conversion: ${conv}%`;

  let own = kickouts.filter(k=>k.team==='own');
  let opp = kickouts.filter(k=>k.team==='opp');

  let ownWon = own.filter(k=>k.result==='won').length;
  let oppWon = opp.filter(k=>k.result==='won').length;

  let ownPct = own.length ? (ownWon/own.length*100).toFixed(1):0;
  let oppPct = opp.length ? (oppWon/opp.length*100).toFixed(1):0;

  document.getElementById("kickStats").innerText =
`Own Kickouts: ${ownWon}/${own.length} (${ownPct}%)
Opp Press: ${oppWon}/${opp.length} (${oppPct}%)`;

  let insightText = "";

  if(conv < 50) insightText += "Low scoring efficiency\n";
  else insightText += "Good scoring efficiency\n";

  if(ownPct < 50) insightText += "Kickouts under pressure\n";
  else insightText += "Kickouts strong\n";

  if(oppPct > 50) insightText += "Press working well\n";
  else insightText += "Press ineffective\n";

  document.getElementById("insight").innerText = insightText;
}

function back(){
  document.getElementById("stats").style.display="none";
  document.getElementById("match").style.display="block";
}

function saveMatch(){
  alert("Match saved ✅");
  location.reload();
}

</script>

</body>
</html>
