<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding:10px; }

    button { padding:10px; margin:4px; }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    /* ✅ PITCH */
    #pitch {
      width:100%;
      height:420px;
      background:#2e7d32;
      position:relative;
      border:2px solid white;
      margin-top:10px;
    }

    .line {
      position:absolute;
      width:100%;
      height:2px;
      background:white;
    }

    .box {
      position:absolute;
      border:2px solid white;
    }

    .dot {
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:red;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <!-- ✅ SCORE -->
  <h2 id="score">0-0 | 0-0</h2>

  <!-- ✅ TIMER -->
  <h2 id="timer">1st Half – 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="secondHalf()">Second Half</button>

  <!-- ✅ PLAYER SELECT -->
  <h3>Select Player</h3>
  <div id="playerButtons"></div>

  <!-- ✅ PITCH -->
  <h3>Pitch</h3>
  <div id="pitch" onclick="logShot(event)">

    <!-- End line -->
    <div class="line" style="top:0;"></div>

    <!-- Boxes -->
    <div class="box" style="top:0;left:35%;width:30%;height:12%;"></div>
    <div class="box" style="top:0;left:20%;width:60%;height:20%;"></div>

    <!-- ✅ CLEANED REAL LINES -->
    <div class="line" style="top:20%;"></div>   <!-- 20m -->
    <div class="line" style="top:35%;"></div>   <!-- 45m -->

    <!-- ✅ AGREED WORKABLE ARC -->
    <svg style="position:absolute; top:20%; left:0; width:100%; height:35%;"
         viewBox="0 0 100 100"
         preserveAspectRatio="none">
      <path d="M0,0 Q50,60 100,0"
            stroke="white"
            stroke-width="2"
            fill="none"/>
    </svg>

    <!-- Halfway -->
    <div class="line" style="top:50%;"></div>

    <!-- Opp half -->
    <div class="line" style="top:65%;"></div>
    <div class="line" style="top:80%;"></div>

  </div>

  <!-- ✅ HOME SCORING -->
  <h3>Home Score</h3>
  <div class="grid3">
    <button onclick="addScore('Goal')">Goal</button>
    <button onclick="addScore('2pt')">2PT</button>
    <button onclick="addScore('Point')">1PT</button>
  </div>

  <!-- ✅ OPP SCORING -->
  <h3>Opponent Score</h3>
  <div class="grid3">
    <button onclick="oppScore('Goal')">Goal</button>
    <button onclick="oppScore('2pt')">2PT</button>
    <button onclick="oppScore('Point')">1PT</button>
  </div>

  <!-- ✅ SUMMARY -->
  <h3>Summary</h3>
  <div id="summary"></div>

  <!-- ✅ LAST EVENT -->
  <h3 id="last"></h3>

</div>

<script>

let lineup = {};
let selected = "";

let homeScore = {g:0, p:0, two:0};
let awayScore = {g:0, p:0, two:0};

let stats = {shots:0};

let time = 0;
let running = false;
let timerInt;
let half = "1st Half";

/* PLAYERS */
for(let i=1;i<=15;i++){
  players.innerHTML +=
    `<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>`;
}

/* START */
function startMatch(){

  match.style.display="block";

  let btns="";
  for(let i=1;i<=15;i++){
    btns += `<button onclick="selectPlayer(${i})">${i}</button>`;
  }

  playerButtons.innerHTML = btns;

  updateScore();
  updateSummary();
}

/* TIMER */
function startTimer(){
  if(running) return;

  running=true;

  timerInt = setInterval(()=>{
    time++;

    let m = Math.floor(time/60).toString().padStart(2,"0");
    let s = (time%60).toString().padStart(2,"0");

    timer.innerText = half + " – " + m + ":" + s;
  },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(timerInt);
}

function secondHalf(){
  half = "2nd Half";
  time = 0;
}

/* SELECT PLAYER */
function selectPlayer(n){
  selected = n;
}

/* HOME SCORE */
function addScore(type){

  if(!selected) return;

  stats.shots++;

  if(type==="Goal") homeScore.g++;
  if(type==="2pt") homeScore.two++;
  if(type==="Point") homeScore.p++;

  let name = lineup[selected] || "#"+selected;

  last.innerText = "✅ " + name + " - " + type;

  updateScore();
  updateSummary();
}

/* OPP SCORE */
function oppScore(type){

  if(type==="Goal") awayScore.g++;
  if(type==="2pt") awayScore.two++;
  if(type==="Point") awayScore.p++;

  last.innerText = "🔴 Opp - " + type;

  updateScore();
}

/* SCORE DISPLAY */
function updateScore(){

  score.innerText =
    home.value + ": " +
    homeScore.g + "-" + (homeScore.p + homeScore.two*2)
    + " | " +
    away.value + ": " +
    awayScore.g + "-" + (awayScore.p + awayScore.two*2);
}

/* SUMMARY */
function updateSummary(){
  summary.innerText = "Shots: " + stats.shots;
}

/* SHOT TRACKING */
function logShot(e){

  if(!selected) return;

  let rect = pitch.getBoundingClientRect();

  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let dot = document.createElement("div");

  dot.className = "dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
