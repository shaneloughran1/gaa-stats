<!DOCTYPE html>
<html>
<head=1"><head>
  <title>GAA Stats</title>

  <style>
    body { font-family: Arial; padding: 10px; }
    button { margin:4px; padding:10px; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
  </style>
</head>

<body>

<h2>Match Setup</h2>

<div class="grid2">

  <!-- HOME -->
  <div>
    <h3>Home</h3>
    <input id="home" placeholder="Home Team"><br><br>

    <b>1–15</b><br>
    <div id="players"></div>

    <b>Subs</b><br>
    <div id="subs"></div>
  </div>

  <!-- OPP -->
  <div>
    <h3>Opponent</h3>
    <input id="away" placeholder="Opponent"><br><br>

    <b>1–15</b><br>
    <div id="oppPlayers"></div>

    <b>Subs</b><br>
    <div id="oppSubs"></div>
  </div>

</div>

<br>
<button onclick="startMatch()" style="width:100%">Start Match</button>

<hr>

<!-- MATCH -->
<div id="match" style="display:none">

  <div id="score" style="font-weight:bold"></div>

  <h2 id="timer">1st Half – 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="toggleHalf()">Second Half</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <button onclick="startSub()">SUB</button>

  <h3>Select Opp Player (optional)</h3>
  <div id="oppButtons"></div>

  <h4 id="selected"></h4>

  <!-- HOME -->
  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <h3>Opposition</h3>
  <div class="grid2">
    <button onclick="oppScoreAdd('Goal')">Goal</button>
    <button onclick="oppScoreAdd('2pt')">2PT</button>
    <button onclick="oppScoreAdd('Point')">1PT</button>
    <button onclick="oppWide()">Wide</button>
  </div>

  <h3 id="last"></h3>

</div>

<script>

// DATA
let lineup = {};
let oppLineup = {};

let selected = "";
let selectedOpp = "";

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let subMode=false;
let subOff=null;

let half="1st Half";
let time=0;
let running=false;
let interval;

// INPUTS
for(let i=1;i<=30;i++){
  players.innerHTML += i<=15 ? `<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>` : "";
  subs.innerHTML += i>15 ? `<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>` : "";

  oppPlayers.innerHTML += i<=15 ? `<input placeholder="Opp #${i}" onchange="oppLineup[${i}]=this.value"><br>` : "";
  oppSubs.innerHTML += i>15 ? `<input placeholder="Opp #${i}" onchange="oppLineup[${i}]=this.value"><br>` : "";
}

// BUILD BUTTONS
function buildButtons(){

  // HOME BUTTONS
  let html="";
  for(let i=1;i<=30;i++){
    let disabled = i>15;
    html += `<button onclick="selectPlayer(${i})" ${disabled?'disabled':''}>${i}</button>`;
  }
  playerButtons.innerHTML = html;

  // OPP BUTTONS (always visible)
  let oppHtml="";
  for(let i=1;i<=30;i++){
    oppHtml += `<button onclick="selectOpp(${i})">${i}</button>`;
  }
  oppButtons.innerHTML = oppHtml;

}

// START MATCH
function startMatch(){
  document.getElementById("match").style.display="block";
  buildButtons();
  updateScore();
}

// TIMER
function startTimer(){
  if(running)return;
  running=true;
  interval=setInterval(()=>{
    time++;
    let m=Math.floor(time/60).toString().padStart(2,"0");
    let s=(time%60).toString().padStart(2,"0");
    timer.innerText=half+" – "+m+":"+s;
  },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(interval);
}

function toggleHalf(){
  half="2nd Half";
  time=0;
}

// TIME
function now(){
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  return `${half} ${m}:${s}`;
}

// SUB
function startSub(){
  subMode=true;
  subOff=null;
  last.innerText="Select player OFF";
}

function selectPlayer(n){

  if(subMode){
    if(!subOff){
      subOff=n;
      last.innerText="Select player ON";
      return;
    }

    let offBtn=document.querySelector(`button[onclick="selectPlayer(${subOff})"]`);
    let onBtn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);

    if(offBtn){ offBtn.disabled=true; offBtn.style.background="#ccc"; }
    if(onBtn){ onBtn.disabled=false; }

    last.innerText=`🔁 ${now()} – #${subOff} OFF → #${n} ON`;

    subMode=false;
    return;
  }

  let btn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);
  if(btn && btn.disabled)return;

  selected=n;
  let name=lineup[n];
  document.getElementById("selected").innerText=
    name?`#${n} - ${name}`:`#${n}`;
}

// OPP SELECT
function selectOpp(n){
  selectedOpp=n;
}

// HOME SCORE
function add(type){
  if(!selected)return;

  let name=lineup[selected]||("#"+selected);

  if(type==="Goal")score.g++;
  if(type==="2pt")score.two++;
  if(type==="Point")score.p++;

  last.innerText=`✅ ${now()} – ${name} - ${type}`;
  updateScore();
}

// OPP SCORE
function oppScoreAdd(type){

  let name = selectedOpp ? (oppLineup[selectedOpp]||("#"+selectedOpp)) : "Opp";

  if(type==="Goal")oppScore.g++;
  if(type==="2pt")oppScore.two++;
  if(type==="Point")oppScore.p++;

  last.innerText=`🔴 ${now()} – ${name} - ${type}`;

  selectedOpp="";
  updateScore();
}

// OPP WIDE
function oppWide(){
  let name = selectedOpp ? (oppLineup[selectedOpp]||("#"+selectedOpp)) : "Opp";

  last.innerText=`🔴 ${now()} – ${name} - Wide`;
  selectedOpp="";
}

// SCORE DISPLAY
function updateScore(){
  document.getElementById("score").innerText =
    document.getElementById("home").value + ": " + score.g + "-" + (score.p + score.two*2)
    + " | " +
    document.getElementById("away").value + ": " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

</script>

</body>
</html>
