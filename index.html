<!DOCTYPE html>
<html>
<head>
<title>GAA Match Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding:10px; }

/* ✅ SIDE BY SIDE PLAYER PANELS */
.row { display:flex; gap:20px; }
.column { flex:1; }

/* ✅ INPUTS NOW HALF WIDTH */
input {
  width:45%;
  margin:2px 0;
  padding:4px;
}

button { padding:8px; margin:3px; }

.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

#timeline {
 max-height:200px;
 overflow-y:auto;
 border:1px solid #ccc;
 padding:6px;
}
</style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team" oninput="updateHeaders()"><br><br>
<input id="away" placeholder="Opponent" oninput="updateHeaders()"><br><br>

<div class="row">

<div class="column">
<h3 id="homeTitle">Home Players</h3>
<div id="homeInputs"></div>
</div>

<div class="column">
<h3 id="awayTitle">Opp Players</h3>
<div id="awayInputs"></div>
</div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

<h2 id="score">0-0 | 0-0</h2>
<h3 id="timer">1st Half – 00:00</h3>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="secondHalf()">2nd Half</button>
<button onclick="endMatch()" style="background:red;color:white;">END MATCH</button>

<h3>Select Player</h3>
<div id="playerButtons"></div>
<button onclick="startSub()">SUB</button>

<h3>Select Opp Player</h3>
<div id="oppButtons"></div>
<button onclick="startOppSub()">OPP SUB</button>

<h3>Home</h3>
<div class="grid3">
<button onclick="addScore('Goal')">Goal</button>
<button onclick="addScore('Point')">Point</button>
<button onclick="addScore('2pt')">2PT</button>
<button onclick="addWide()">Wide</button>
</div>

<h3>Kickouts (Home)</h3>
<div class="grid2">
<button onclick="kickout('won')">KO Won</button>
<button onclick="kickout('lost')">KO Lost</button>
</div>

<h3>Opponent</h3>
<div class="grid3">
<button onclick="oppScore('Goal')">Goal</button>
<button onclick="oppScore('Point')">Point</button>
<button onclick="oppScore('2pt')">2PT</button>
<button onclick="oppWide()">Wide</button>
</div>

<h3>Kickouts (Opponent)</h3>
<div class="grid2">
<button onclick="oppKickout('won')">KO Won</button>
<button onclick="oppKickout('lost')">KO Lost</button>
</div>

<h3>Summary</h3>
<div id="summary"></div>

<h3>Timeline</h3>
<div id="timeline"></div>

</div>

<script>

let lineup={}, oppLineup={};
let selected="", selectedOpp="";

let playerStats={}, oppPlayerStats={};

let homeScore={g:0,p:0,two:0};
let awayScore={g:0,p:0,two:0};

let stats={shots:0,wides:0,koWon:0,koLost:0};
let oppStats={wides:0,koWon:0,koLost:0};

let time=0, running=false, timerInt;
let half="1st Half";
let matchEnded=false;

let subMode=false, subOff=null;
let oppSubMode=false, oppSubOff=null;

/* ✅ BUILD PLAYER INPUTS */
for(let i=1;i<=30;i++){
 homeInputs.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}]=this.value">`;
 awayInputs.innerHTML += `<input placeholder="#${i}" onchange="oppLineup[${i}]=this.value">`;
}

/* ✅ HEADERS */
function updateHeaders(){
 homeTitle.innerText = home.value || "Home Players";
 awayTitle.innerText = away.value || "Opp Players";
}

/* ✅ START MATCH */
function startMatch(){

 match.style.display="block";

 let p="", o="";
 for(let i=1;i<=30;i++){
  let dis=i>15?"disabled":"";
  p += `<button onclick="selectPlayer(${i})" ${dis}>${i}</button>`;
  o += `<button onclick="selectOpp(${i})" ${dis}>${i}</button>`;
 }

 playerButtons.innerHTML=p;
 oppButtons.innerHTML=o;

 updateScore();
 updateSummary();
}

/* ✅ TIMER */
function startTimer(){
 if(running||matchEnded)return;
 running=true;
 timerInt=setInterval(()=>{
  time++;
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  timer.innerText=half+" – "+m+":"+s;
 },1000);
}

function pauseTimer(){ running=false; clearInterval(timerInt); }
function secondHalf(){ half="2nd Half"; time=0; }

/* ✅ SUBS */
function startSub(){ subMode=true; subOff=null; }
function startOppSub(){ oppSubMode=true; oppSubOff=null; }

function selectPlayer(n){

 let btn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);

 if(subMode){
  if(!subOff){ subOff=n; return; }
  document.querySelector(`button[onclick="selectPlayer(${subOff})"]`).disabled=true;
  btn.disabled=false;
  logEvent(`🔁 #${subOff} OFF → #${n} ON`);
  subMode=false;
  return;
 }

 if(btn.disabled||matchEnded) return;

 selected=n;
}

function selectOpp(n){

 let btn=document.querySelector(`button[onclick="selectOpp(${n})"]`);

 if(oppSubMode){
  if(!oppSubOff){ oppSubOff=n; return; }
  document.querySelector(`button[onclick="selectOpp(${oppSubOff})"]`).disabled=true;
  btn.disabled=false;
  logEvent(`🔁 Opp #${oppSubOff} OFF → #${n} ON`);
  oppSubMode=false;
  return;
 }

 if(btn.disabled||matchEnded) return;

 selectedOpp=n;
}

/* ✅ SCORING */
function addScore(type){

 if(matchEnded||!selected)return;

 if(!playerStats[selected]) playerStats[selected]={g:0,p:0,two:0};

 if(type==="Goal"){homeScore.g++; playerStats[selected].g++;}
 if(type==="Point"){homeScore.p++; playerStats[selected].p++;}
 if(type==="2pt"){homeScore.two++; playerStats[selected].two++;}

 stats.shots++;

 logEvent(`✅ ${lineup[selected]||"#"+selected} – ${type}`);

 updateScore(); updateSummary();
}

function oppScore(type){

 if(matchEnded||!selectedOpp)return;

 if(!oppPlayerStats[selectedOpp]) oppPlayerStats[selectedOpp]={g:0,p:0,two:0};

 if(type==="Goal"){awayScore.g++; oppPlayerStats[selectedOpp].g++;}
 if(type==="Point"){awayScore.p++; oppPlayerStats[selectedOpp].p++;}
 if(type==="2pt"){awayScore.two++; oppPlayerStats[selectedOpp].two++;}

 logEvent(`🔴 ${(oppLineup[selectedOpp]||"#"+selectedOpp)} – ${type}`);

 selectedOpp="";
 updateScore(); updateSummary();
}

/* ✅ OTHER EVENTS */
function addWide(){ stats.wides++; stats.shots++; logEvent("⚪ Wide"); updateSummary(); }
function oppWide(){ oppStats.wides++; logEvent("🔴 Opp Wide"); updateSummary(); }

function kickout(t){
 if(t==="won"){ stats.koWon++; logEvent("🟢 KO Won"); }
 else{ stats.koLost++; logEvent("🔴 KO Lost"); }
 updateSummary();
}

function oppKickout(t){
 if(t==="won"){ oppStats.koWon++; logEvent("🔴 Opp KO Won"); }
 else{ oppStats.koLost++; logEvent("🟢 Opp KO Lost"); }
 updateSummary();
}

/* ✅ SCORE DISPLAY */
function updateScore(){
 score.innerText =
 (home.value||"Home")+": "+homeScore.g+"-"+(homeScore.p+homeScore.two*2)
 +" | "+
 (away.value||"Opp")+": "+awayScore.g+"-"+(awayScore.p+awayScore.two*2);
}

/* ✅ SUMMARY */
function updateSummary(){

 let homeTxt="", oppTxt="";

 Object.entries(playerStats).forEach(([n,s])=>{
  let total=s.g*3+s.p+s.two*2;
  homeTxt += `${lineup[n]||"#"+n} – ${s.g}-${s.p}-${s.two} (${total})<br>`;
 });

 Object.entries(oppPlayerStats).forEach(([n,s])=>{
  let total=s.g*3+s.p+s.two*2;
  oppTxt += `${oppLineup[n]||"#"+n} – ${s.g}-${s.p}-${s.two} (${total})<br>`;
 });

 summary.innerHTML =
 "<b>HOME</b><br>"+(homeTxt||"None")+"<br><br>"+
 "<b>OPP</b><br>"+(oppTxt||"None");
}

/* ✅ TIMELINE */
function logEvent(t){
 let d=document.createElement("div");
 d.innerText=t;
 timeline.prepend(d);
}

/* ✅ END MATCH */
function endMatch(){
 if(matchEnded) return;
 matchEnded=true;
 pauseTimer();
 logEvent("🏁 Full Time – "+score.innerText);
}

</script>

</body>
</html>
