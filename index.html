<!DOCTYPE html>
<html>
<head>
<title>GAA Match Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding:10px; }

.row { display:flex; gap:20px; }
.column { flex:1; }

input { width:100%; margin:2px 0; }

button { padding:8px; margin:3px; }

.grid3 {display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
.grid2 {display:grid; grid-template-columns:1fr 1fr; gap:8px;}

#pitch {
 width:100%; height:420px; background:#2e7d32;
 position:relative;
 border-left:2px solid white;
 border-right:2px solid white;
 border-top:2px solid white;
}

.line{position:absolute;width:100%;height:2px;background:white;}
.box{position:absolute;border:2px solid white;}
.dot{position:absolute;width:8px;height:8px;border-radius:50%;background:red;}

#timeline {
 max-height:200px; overflow-y:auto;
 border:1px solid #ccc; padding:6px;
}
</style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team" oninput="updateHeaders()"><br><br>
<input id="away" placeholder="Opponent" oninput="updateHeaders()"><br><br>

<div class="row">

<div class="column">
<h3 id="homeTitle">Home Players</h3>
<div id="homePlayers"></div>
</div>

<div class="column">
<h3 id="awayTitle">Opp Players</h3>
<div id="awayPlayers"></div>
</div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

<h2 id="score">0-0 | 0-0</h2>

<button onclick="endMatch()" style="background:red;color:white;">END MATCH</button>

<h3>Pitch</h3>
<div id="pitch" onclick="logShot(event)">

<div class="line" style="top:0;"></div>
<div class="box" style="top:0;left:40%;width:20%;height:8%;"></div>
<div class="box" style="top:0;left:25%;width:50%;height:16%;"></div>
<div class="line" style="top:22%;"></div>

<!-- ✅ ARC FIXED FINAL -->
<svg style="position:absolute; top:22%; left:10%; width:80%; height:25%;">
 <path d="M0,0 Q50,50 100,0"
 stroke="white" stroke-width="2" fill="none"/>
</svg>

<div class="line" style="top:42%;"></div>

</div>

<h3>Home</h3>
<div class="grid3">
<button onclick="addScore('Goal')">Goal</button>
<button onclick="addScore('Point')">Point</button>
<button onclick="addScore('2pt')">2PT</button>
<button onclick="addWide()">Wide</button>
</div>

<h3>Kickouts</h3>
<div class="grid2">
<button onclick="kickout('won')">KO Won</button>
<button onclick="kickout('lost')">KO Lost</button>
</div>

<h3>Opponent</h3>
<div class="grid3">
<button onclick="oppScore('Goal')">Goal</button>
<button onclick="oppScore('Point')">Point</button>
<button onclick="oppScore('2pt')">2PT</button>
<button onclick="oppWide()">Wide</button>
</div>

<h3>Opp Kickouts</h3>
<div class="grid2">
<button onclick="oppKickout('won')">Opp KO Won</button>
<button onclick="oppKickout('lost')">Opp KO Lost</button>
</div>

<h3>Summary</h3>
<div id="summary"></div>

<h3>Timeline</h3>
<div id="timeline"></div>

</div>

<script>

let matchEnded=false;

let lineup={}, oppLineup={};

let selected="", selectedOpp="";

let playerStats={}, oppPlayerStats={};

let homeScore={g:0,p:0,two:0};
let awayScore={g:0,p:0,two:0};

let stats={shots:0,wides:0,koWon:0,koLost:0};
let oppStats={wides:0,koWon:0,koLost:0};

let subMode=false, subOff=null;
let oppSubMode=false, oppSubOff=null;

/* BUILD PLAYERS IMMEDIATELY */
for(let i=1;i<=30;i++){
 homePlayers.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}]=this.value">`;
 awayPlayers.innerHTML += `<input placeholder="#${i}" onchange="oppLineup[${i}]=this.value">`;
}

function updateHeaders(){
 homeTitle.innerText = home.value || "Home Players";
 awayTitle.innerText = away.value || "Opp Players";
}

/* START MATCH */
function startMatch(){

 match.style.display="block";

 for(let i=1;i<=30;i++){

  let dis=i>15?"disabled":"";

  playerButtons = playerButtons || document.createElement("div");
  oppButtons = oppButtons || document.createElement("div");

 }

}

/* SUBS FIXED */
function startSub(){subMode=true;subOff=null;}
function startOppSub(){oppSubMode=true;oppSubOff=null;}

function selectPlayer(n){

 if(subMode){
  if(!subOff){subOff=n;return;}
  subMode=false;
  return;
 }

 selected=n;
}

function selectOpp(n){

 if(oppSubMode){
  if(!oppSubOff){oppSubOff=n;return;}
  oppSubMode=false;
  return;
 }

 selectedOpp=n;
}

/* ✅ SCORING FIXED */
function addScore(type){

 if(matchEnded||!selected) return;

 if(!playerStats[selected]) playerStats[selected]={g:0,p:0,two:0};

 if(type==="Goal"){homeScore.g++; playerStats[selected].g++;}
 if(type==="Point"){homeScore.p++; playerStats[selected].p++;}
 if(type==="2pt"){homeScore.two++; playerStats[selected].two++;}

 stats.shots++;

 logEvent(`✅ ${lineup[selected]||"#"+selected} – ${type}`);

 updateScore(); updateSummary();
}

function oppScore(type){

 if(matchEnded||!selectedOpp) return;

 if(!oppPlayerStats[selectedOpp]) oppPlayerStats[selectedOpp]={g:0,p:0,two:0};

 if(type==="Goal"){awayScore.g++; oppPlayerStats[selectedOpp].g++;}
 if(type==="Point"){awayScore.p++; oppPlayerStats[selectedOpp].p++;}
 if(type==="2pt"){awayScore.two++; oppPlayerStats[selectedOpp].two++;}

 logEvent(`🔴 ${(oppLineup[selectedOpp]||"#"+selectedOpp)} – ${type}`);

 updateScore(); updateSummary();
}

function addWide(){stats.wides++; stats.shots++; updateSummary();}
function oppWide(){oppStats.wides++; updateSummary();}

function kickout(t){if(t==="won")stats.koWon++; else stats.koLost++; updateSummary();}
function oppKickout(t){if(t==="won")oppStats.koWon++; else oppStats.koLost++; updateSummary();}

/* ✅ SUMMARY FIXED */
function updateSummary(){

 let homeTxt="", oppTxt="";

 Object.entries(playerStats).forEach(([n,s])=>{
  let total=s.g*3+s.p+s.two*2;
  homeTxt+=`${lineup[n]||"#"+n} – ${s.g}-${s.p}-${s.two} (${total})<br>`;
 });

 Object.entries(oppPlayerStats).forEach(([n,s])=>{
  let total=s.g*3+s.p+s.two*2;
  oppTxt+=`${oppLineup[n]||"#"+n} – ${s.g}-${s.p}-${s.two} (${total})<br>`;
 });

 summary.innerHTML =
 "<b>HOME</b><br>"+(homeTxt||"None")+"<br><br>"+
 "<b>OPP</b><br>"+(oppTxt||"None");
}

function updateScore(){
 score.innerText =
 (home.value||"Home")+": "+homeScore.g+"-"+(homeScore.p+homeScore.two*2)
 +" | "+
 (away.value||"Opp")+": "+awayScore.g+"-"+(awayScore.p+awayScore.two*2);
}

/* TIMELINE */
function logEvent(t){
 if(matchEnded)return;
 let d=document.createElement("div");
 d.innerText=t;
 timeline.prepend(d);
}

function endMatch(){
 matchEnded=true;
 logEvent("FULL TIME – "+score.innerText);
}

function logShot(e){
 if(matchEnded||!selected)return;
 let r=pitch.getBoundingClientRect();
 let d=document.createElement("div");
 d.className="dot";
 d.style.left=(e.clientX-r.left)+"px";
 d.style.top=(e.clientY-r.top)+"px";
 pitch.appendChild(d);
}

</script>

</body>
</html>
