<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    #pitch {
      width: 100%;
      height: 420px;
      background: #2e7d32;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot {
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      background:red;
    }

    button { margin:4px; padding:10px; }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <!-- SCORE -->
  <div id="score" style="font-weight:bold; float:right;"></div>

  <!-- TIMER -->
  <h2 id="timer">00:00</h2>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>

  <!-- PLAYERS -->
  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <h4 id="selected"></h4>

  <!-- ✅ PITCH (UNCHANGED WORKABLE VERSION) -->
  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>

    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;"
         viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M5,0 Q50,80 95,0"
            stroke="white" stroke-width="1.5" fill="none"/>
    </svg>

    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>
  </div>

  <!-- ✅ HOME -->
  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <!-- ✅ OPPOSITION -->
  <h3>Opposition</h3>
  <div class="grid3">
    <button onclick="opp('Goal')">Goal</button>
    <button onclick="opp('2pt')">2PT</button>
    <button onclick="opp('Point')">1PT</button>
  </div>

  <!-- ✅ QUICK EVENTS (BOTTOM NOW) -->
  <h3>Quick Events</h3>
  <div class="grid3">
    <button onclick="quick('Won Ball')">Won Ball</button>
    <button onclick="quick('Lost Ball')">Lost Ball</button>
    <button onclick="quick('Kickout Won')">KO Won</button>
    <button onclick="quick('Kickout Lost')">KO Lost</button>
    <button onclick="quick('Mark')">Mark</button>
    <button onclick="quick('Miss')">Miss</button>
  </div>

  <button onclick="undo()">Undo</button>

  <!-- ✅ MATCH SUMMARY -->
  <h3>Match Summary</h3>
  <div id="summary"></div>

  <h3 id="last" style="text-align:center;"></h3>

</div>

<script>

let lineup = {};
let selected = "";
let time = 0;
let running = false;
let timer;

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let stats = {shots:0, quick:0};

let lastEvent = null;

// PLAYERS
const playersDiv = document.getElementById("players");

for (let i=1;i<=15;i++){
  playersDiv.innerHTML += `
    <input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>
  `;
}

// START
function startMatch(){
  document.getElementById("match").style.display = "block";

  document.getElementById("playerButtons").innerHTML =
    Object.keys(lineup).map(n =>
      `<button id="p${n}" onclick="selectPlayer(${n})">${n}</button>`
    ).join("");

  updateScore();
  updateSummary();
}

// PLAYER SELECT
function selectPlayer(n){

  Object.keys(lineup).forEach(num => {
    let btn = document.getElementById("p"+num);
    if(btn) btn.style.background="";
  });

  selected = n;

  let btn = document.getElementById("p"+n);
  if(btn) btn.style.background="#ffd54f";

  document.getElementById("selected").innerText =
    "Selected: #" + n + " - " + lineup[n];
}

// HOME
function add(type){
  if(!selected) return;

  if(type==="Goal"){ score.g++; stats.shots++; }
  if(type==="2pt"){ score.two++; stats.shots++; }
  if(type==="Point"){ score.p++; stats.shots++; }

  lastEvent = {type,team:"home"};

  document.getElementById("last").innerText =
    "✅ " + lineup[selected] + " - " + type;

  updateScore();
  updateSummary();
}

// OPP
function opp(type){
  if(type==="Goal") oppScore.g++;
  if(type==="2pt") oppScore.two++;
  if(type==="Point") oppScore.p++;

  lastEvent = {type,team:"opp"};

  document.getElementById("last").innerText =
    "🔴 Opp - " + type;

  updateScore();
  updateSummary();
}

// QUICK
function quick(type){

  stats.quick++;

  let label = selected && lineup[selected]
    ? lineup[selected] + " - " + type
    : "Team - " + type;

  document.getElementById("last").innerText =
    "⚡ " + label;

  lastEvent = {type,team:"quick"};

  updateSummary();
}

// UNDO
function undo(){
  if(!lastEvent) return;

  if(lastEvent.team==="home"){
    if(lastEvent.type==="Goal"){ score.g--; stats.shots--; }
    if(lastEvent.type==="2pt"){ score.two--; stats.shots--; }
    if(lastEvent.type==="Point"){ score.p--; stats.shots--; }
  }

  if(lastEvent.team==="opp"){
    if(lastEvent.type==="Goal") oppScore.g--;
    if(lastEvent.type==="2pt") oppScore.two--;
    if(lastEvent.type==="Point") oppScore.p--;
  }

  if(lastEvent.team==="quick"){
    stats.quick--;
  }

  updateScore();
  updateSummary();
}

// SCORE
function updateScore(){
  document.getElementById("score").innerText =
    home.value + ": " + score.g + "-" + (score.p + score.two*2)
    + " | " +
    away.value + ": " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

// ✅ SUMMARY PANEL
function updateSummary(){
  document.getElementById("summary").innerHTML =
    "Shots: " + stats.shots + "<br>" +
    "Goals: " + score.g + "<br>" +
    "Points: " + score.p + "<br>" +
    "2 Pointers: " + score.two + "<br>" +
    "Quick Events: " + stats.quick;
}

// TIMER
function start(){
  if(running) return;
  running=true;

  timer=setInterval(()=>{
    time++;
    let m=Math.floor(time/60).toString().padStart(2,"0");
    let s=(time%60).toString().padStart(2,"0");
    timer.innerText;
    document.getElementById("timer").innerText=m+":"+s;
  },1000);
}

function pause(){
  running=false;
  clearInterval(timer);
}

// SHOT DOTS
function logShot(e){
  if(!selected) return;

  let rect = pitch.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let dot = document.createElement("div");
  dot.className="dot";
  dot.style.left=x+"px";
  dot.style.top=y+"px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
