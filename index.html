<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    #pitch {
      width: 100%;
      height: 420px;
      background: #2e7d32;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .line {
      position:absolute;
      width:100%;
      height:2px;
      background:white;
    }

    .box {
      position:absolute;
      border:2px solid white;
    }

    .dot {
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:red;
    }

    button { margin: 4px; padding: 8px; }
  </style>

</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold; float:right;"></div>

  <h2 id="timer">00:00</h2>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>

  <!-- ✅ PITCH -->
  <div id="pitch" onclick="logShot(event)">

    <!-- END LINE -->
    <div class="line" style="top:0;"></div>

    <!-- BOXES -->
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>

    <!-- LINES -->
    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <!-- ✅ ✅ WORKABLE ARC (FIXED PROPERLY) -->
    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;"
         viewBox="0 0 100 100"
         preserveAspectRatio="none">

      <path d="M5,0 Q50,80 95,0"
            stroke="white"
            stroke-width="1"
            fill="none"/>
    </svg>

    <!-- LOWER LINES -->
    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>

  </div>

  <!-- HOME -->
  <h3>Home</h3>
  <button onclick="add('goal')">Goal</button>
  <button onclick="add('two')">2pt</button>
  <button onclick="add('point')">1pt</button>
  <button onclick="undo()">Undo</button>

  <!-- OPP -->
  <h3>Opposition</h3>
  <button onclick="opp('goal')">Opp Goal</button>
  <button onclick="opp('two')">Opp 2pt</button>
  <button onclick="opp('point')">Opp 1pt</button>

  <h4 id="last"></h4>

</div>

<script>

let lineup = {};
let selected = "";
let time = 0;
let running = false;
let timer;

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let lastEvent = null;

const playersDiv = document.getElementById("players");

for (let i=1;i<=15;i++){
  playersDiv.innerHTML += `
    <input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>
  `;
}

function startMatch(){
  document.getElementById("match").style.display = "block";

  document.getElementById("playerButtons").innerHTML =
    Object.keys(lineup).map(n =>
      `<button onclick="selected=${n}">${n}</button>`
    ).join("");
}

function add(type){
  if(!selected) return;

  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  if(type==="point") score.p++;

  lastEvent = {type, team:"home"};

  updateScore();
}

function opp(type){
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  if(type==="point") oppScore.p++;

  lastEvent = {type, team:"opp"};

  updateScore();
}

function undo(){
  if(!lastEvent) return;

  if(lastEvent.team==="home"){
    if(lastEvent.type==="goal") score.g--;
    if(lastEvent.type==="two") score.two--;
    if(lastEvent.type==="point") score.p--;
  } else {
    if(lastEvent.type==="goal") oppScore.g--;
    if(lastEvent.type==="two") oppScore.two--;
    if(lastEvent.type==="point") oppScore.p--;
  }

  updateScore();
}

function updateScore(){
  document.getElementById("score").innerText =
    document.getElementById("home").value + ": " +
    score.g + "-" + (score.p + score.two*2)
    + " | " +
    document.getElementById("away").value + ": " +
    oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

function start(){
  if(running) return;
  running=true;

  timer=setInterval(()=>{
    time++;
    const m=Math.floor(time/60).toString().padStart(2,"0");
    const s=(time%60).toString().padStart(2,"0");
    document.getElementById("timer").innerText=m+":"+s;
  },1000);
}

function pause(){
  running=false;
  clearInterval(timer);
}

function logShot(e){
  if(!selected) return;

  const rect = pitch.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
