<!DOCTYPE html>
<html>
<head>
<title>GAA Match Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {padding:10px;font-family:Arial;}

.row {display:flex;gap:30px;}
.column {flex:1;}

.pitch-rows {display:flex;flex-direction:column;align-items:center;gap:12px;}

.row1 {display:flex;justify-content:center;width:260px;}
.row3 {display:grid;grid-template-columns:1fr 1fr 1fr;width:260px;}
.row2 {display:grid;grid-template-columns:1fr 1fr;width:180px;gap:30px;}

.row1 input,.row2 input,.row3 input {
 width:70px;text-align:center;justify-self:center;
}

.subs input {display:inline-block;width:60px;margin:3px;}

button {padding:6px;margin:3px;}

#timeline {
 max-height:200px;
 overflow-y:auto;
 border:1px solid #ccc;
 padding:5px;
}

#match {display:none;}
</style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<div class="row">

<div class="column">
<h3>Home</h3>

<div class="pitch-rows">
<div class="row1">
<input onclick="selectPlayer(1)" onchange="lineup[1]=this.value" placeholder="#1">
</div>

<div class="row3">
<input onclick="selectPlayer(2)" onchange="lineup[2]=this.value" placeholder="#2">
<input onclick="selectPlayer(3)" onchange="lineup[3]=this.value" placeholder="#3">
<input onclick="selectPlayer(4)" onchange="lineup[4]=this.value" placeholder="#4">
</div>

<div class="row3">
<input onclick="selectPlayer(5)" onchange="lineup[5]=this.value" placeholder="#5">
<input onclick="selectPlayer(6)" onchange="lineup[6]=this.value" placeholder="#6">
<input onclick="selectPlayer(7)" onchange="lineup[7]=this.value" placeholder="#7">
</div>

<div class="row2">
<input onclick="selectPlayer(8)" onchange="lineup[8]=this.value" placeholder="#8">
<input onclick="selectPlayer(9)" onchange="lineup[9]=this.value" placeholder="#9">
</div>

<div class="row3">
<input onclick="selectPlayer(10)" onchange="lineup[10]=this.value" placeholder="#10">
<input onclick="selectPlayer(11)" onchange="lineup[11]=this.value" placeholder="#11">
<input onclick="selectPlayer(12)" onchange="lineup[12]=this.value" placeholder="#12">
</div>

<div class="row3">
<input onclick="selectPlayer(13)" onchange="lineup[13]=this.value" placeholder="#13">
<input onclick="selectPlayer(14)" onchange="lineup[14]=this.value" placeholder="#14">
<input onclick="selectPlayer(15)" onchange="lineup[15]=this.value" placeholder="#15">
</div>
</div>

<h4>Subs</h4>
<div id="homeSubs" class="subs"></div>
</div>

<div class="column">
<h3>Opposition</h3>

<div class="pitch-rows">
<div class="row1">
<input onclick="selectOpp(1)" onchange="oppLineup[1]=this.value" placeholder="#1">
</div>

<div class="row3">
<input onclick="selectOpp(2)" onchange="oppLineup[2]=this.value" placeholder="#2">
<input onclick="selectOpp(3)" onchange="oppLineup[3]=this.value" placeholder="#3">
<input onclick="selectOpp(4)" onchange="oppLineup[4]=this.value" placeholder="#4">
</div>

<div class="row3">
<input onclick="selectOpp(5)" onchange="oppLineup[5]=this.value" placeholder="#5">
<input onclick="selectOpp(6)" onchange="oppLineup[6]=this.value" placeholder="#6">
<input onclick="selectOpp(7)" onchange="oppLineup[7]=this.value" placeholder="#7">
</div>

<div class="row2">
<input onclick="selectOpp(8)" onchange="oppLineup[8]=this.value" placeholder="#8">
<input onclick="selectOpp(9)" onchange="oppLineup[9]=this.value" placeholder="#9">
</div>

<div class="row3">
<input onclick="selectOpp(10)" onchange="oppLineup[10]=this.value" placeholder="#10">
<input onclick="selectOpp(11)" onchange="oppLineup[11]=this.value" placeholder="#11">
<input onclick="selectOpp(12)" onchange="oppLineup[12]=this.value" placeholder="#12">
</div>

<div class="row3">
<input onclick="selectOpp(13)" onchange="oppLineup[13]=this.value" placeholder="#13">
<input onclick="selectOpp(14)" onchange="oppLineup[14]=this.value" placeholder="#14">
<input onclick="selectOpp(15)" onchange="oppLineup[15]=this.value" placeholder="#15">
</div>
</div>

<h4>Subs</h4>
<div id="awaySubs" class="subs"></div>
</div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match">

<h2 id="score">0-0 | 0-0</h2>

<h3>Home</h3>
<button onclick="addScore('Goal')">Goal</button>
<button onclick="addScore('Point')">Point</button>
<button onclick="addWide()">Wide</button>

<h3>Opponent</h3>
<button onclick="oppScore('Goal')">Goal</button>
<button onclick="oppScore('Point')">Point</button>
<button onclick="oppWide()">Wide</button>

<h3>Kickouts</h3>
<button onclick="kickout('won')">Won</button>
<button onclick="kickout('lost')">Lost</button>
<button onclick="oppKickout('won')">Opp Won</button>
<button onclick="oppKickout('lost')">Opp Lost</button>

<h3>Summary</h3>
<div id="summary"></div>

<h3>Scorers</h3>
<div id="scorers"></div>

<h3>Timeline</h3>
<div id="timeline"></div>

</div>

<script>

let lineup={}, oppLineup={};
let selected="", selectedOpp="";

let playerStats={}, oppPlayerStats={};

let homeScore={g:0,p:0};
let awayScore={g:0,p:0};

let stats={shots:0,wides:0,koWon:0,koLost:0};
let oppStats={wides:0};
let oppKO={won:0,lost:0};

/* subs */
for(let i=16;i<=30;i++){
 homeSubs.innerHTML+=`<input onclick="selectPlayer(${i})" onchange="lineup[${i}]=this.value" placeholder="#${i}">`;
 awaySubs.innerHTML+=`<input onclick="selectOpp(${i})" onchange="oppLineup[${i}]=this.value" placeholder="#${i}">`;
}

function startMatch(){
 document.getElementById("match").style.display="block";
 updateScore();
}

function selectPlayer(n){selected=n;}
function selectOpp(n){selectedOpp=n;}

function addScore(t){
 if(!selected)return;

 if(!playerStats[selected]) playerStats[selected]={g:0,p:0};

 if(t=="Goal"){homeScore.g++;playerStats[selected].g++;}
 if(t=="Point"){homeScore.p++;playerStats[selected].p++;}

 stats.shots++;
 logEvent("#"+selected+" "+t);

 updateScore();updateSummary();
}

function addWide(){stats.wides++;stats.shots++;logEvent("Wide");updateSummary();}

function oppScore(t){
 if(!selectedOpp)return;

 if(!oppPlayerStats[selectedOpp]) oppPlayerStats[selectedOpp]={g:0,p:0};

 if(t=="Goal"){awayScore.g++;oppPlayerStats[selectedOpp].g++;}
 if(t=="Point"){awayScore.p++;oppPlayerStats[selectedOpp].p++;}

 logEvent("Opp #"+selectedOpp+" "+t);

 updateScore();updateSummary();
}

function oppWide(){oppStats.wides++;logEvent("Opp Wide");updateSummary();}

function kickout(t){
 t=="won"?stats.koWon++:stats.koLost++;
 logEvent("KO "+t);
 updateSummary();
}

function oppKickout(t){
 t=="won"?oppKO.won++:oppKO.lost++;
 logEvent("Opp KO "+t);
 updateSummary();
}

function logEvent(txt){
 let d=document.createElement("div");
 d.innerText=txt;
 timeline.prepend(d);
}

function updateScore(){
 let homeName=home.value||"Home";
 let awayName=away.value||"Opp";

 let homeTotal=homeScore.g*3 + homeScore.p;
 let awayTotal=awayScore.g*3 + awayScore.p;

 score.innerText =
 homeName+" "+homeScore.g+"-"+homeScore.p+" ("+homeTotal+") | "+
 awayName+" "+awayScore.g+"-"+awayScore.p+" ("+awayTotal+")";
}

function updateSummary(){

 let total=homeScore.g+homeScore.p;
 let conv=stats.shots?((total/stats.shots)*100).toFixed(1):0;

 let koTotal = stats.koWon + stats.koLost;
 let oppKoTotal = oppKO.won + oppKO.lost;

 let koPct = koTotal ? Math.round((stats.koWon/koTotal)*100) : 0;
 let oppKoPct = oppKoTotal ? Math.round((oppKO.won/oppKoTotal)*100) : 0;

 summary.innerHTML =
 "Shots:"+stats.shots+
 " Wides:"+stats.wides+
 " (Opp:"+oppStats.wides+")"+
 "<br>Conversion:"+conv+"%"+
 "<br>KO:"+stats.koWon+"/"+koTotal+" ("+koPct+"%)"+
 "<br>Opp KO:"+oppKO.won+"/"+oppKoTotal+" ("+oppKoPct+"%)";

 updateScorers();
}

function updateScorers(){

 let h=[],a=[];

 Object.entries(playerStats).forEach(([n,s])=>{
  h.push({name:lineup[n]||"#"+n,g:s.g,p:s.p,pts:s.g*3+s.p});
 });

 Object.entries(oppPlayerStats).forEach(([n,s])=>{
  a.push({name:oppLineup[n]||"#"+n,g:s.g,p:s.p,pts:s.g*3+s.p});
 });

 h.sort((x,y)=>y.pts-x.pts);
 a.sort((x,y)=>y.pts-x.pts);

 let html="<b>HOME</b><br>";

 h.forEach(p=>{
  html+=`${p.name} – ${p.g}-${p.p} (${p.pts})<br>`;
 });

 html+="<br><b>OPP</b><br>";

 a.forEach(p=>{
  html+=`${p.name} – ${p.g}-${p.p} (${p.pts})<br>`;
 });

 scorers.innerHTML=html;
}

</script>

</body>
</html>
