<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAA Half Pitch</title>

<style>
body { font-family: Arial; padding: 10px; }
button { margin: 5px; padding: 10px; }

/* HALF PITCH */
.pitch {
  height: 320px;
  width: 100%;
  background: #2e7d32;
  position: relative;
  border: 2px solid white;
}

/* GOAL LINE (TOP) */
.goal-line {
  position:absolute;
  top:0;
  width:100%;
  height:2px;
  background:white;
}

/* 45 LINE */
.line45 {
  position:absolute;
  bottom:20%;
  width:100%;
  height:2px;
  background:white;
}

/* LARGE RECTANGLE */
.large-box {
  position:absolute;
  top:0;
  left:20%;
  width:60%;
  height:28%;
  border:2px solid white;
}

/* SMALL RECTANGLE */
.small-box {
  position:absolute;
  top:0;
  left:35%;
  width:30%;
  height:14%;
  border:2px solid white;
}

/* ✅ CORRECT ARC (NOW BELOW BOXES) */
.arc {
  position:absolute;
  top:28%;
  left:50%;
  width:55%;
  height:120px;
  border:2px solid white;
  border-top:none;
  border-radius:0 0 50% 50% / 0 0 100% 100%;
  transform:translateX(-50%);
}

/* dots */
.dot {
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
}
.own { background:red; }
.opp { background:yellow; }

</style>
</head>

<body>

<h2 id="score">0-0</h2>
<h3 id="oppScore">Opp: 0-0</h3>

<div class="pitch" id="pitch">

  <div class="goal-line"></div>
  <div class="large-box"></div>
  <div class="small-box"></div>

  <div class="arc"></div>

  <div class="line45"></div>

</div>

<br>

<h3>Own Score</h3>
<button onclick="addScore('point')">1pt</button>
<button onclick="addScore('goal')">Goal</button>
<button onclick="addScore('two')">2pt</button>

<h3>Opposition Score</h3>
<button onclick="addOppScore('point')">1pt</button>
<button onclick="addOppScore('goal')">Goal</button>
<button onclick="addOppScore('two')">2pt</button>

<br><br>

<label>
<input type="checkbox" id="oppToggle"> Track Opposition Shots
</label>

<script>

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

// pitch click
document.getElementById("pitch").onclick = function(e){

  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let isOpp = document.getElementById("oppToggle").checked;

  const dot = document.createElement("div");
  dot.className = "dot " + (isOpp ? "opp" : "own");
  dot.style.left = x+"px";
  dot.style.top = y+"px";
  e.target.appendChild(dot);

  if(isOpp){
    oppScore.p++;
    updateOpp();
  } else {
    score.p++;
    updateScore();
  }
};

// scoring
function addScore(type){
  if(type==="point") score.p++;
  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  updateScore();
}

function addOppScore(type){
  if(type==="point") oppScore.p++;
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  updateOpp();
}

// display
function updateScore(){
  document.getElementById("score").innerText =
    score.g + "-" + (score.p + score.two*2);
}

function updateOpp(){
  document.getElementById("oppScore").innerText =
    "Opp: " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

</script>

</body>
</html>
