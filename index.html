<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    #pitch {
      width: 100%;
      height: 420px;
      background: #2e7d32;
      position: relative;
      border: 2px solid white;
      margin-top: 10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot {
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      background:red;
    }

    button { margin:4px; padding:10px; }

    .grid2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .grid3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<input id="home" placeholder="Home Team"><br><br>
<input id="away" placeholder="Opponent"><br><br>

<h3>Players</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold; float:right;"></div>

  <h2 id="timer">00:00</h2>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <h4 id="selected"></h4>

  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>

    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;"
         viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M5,0 Q50,80 95,0"
            stroke="white" stroke-width="1.5" fill="none"/>
    </svg>

    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>
  </div>

  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <h3>Kickouts</h3>
  <div class="grid2">
    <button onclick="kickout('won')">KO Won</button>
    <button onclick="kickout('lost')">KO Lost</button>
  </div>

  <h3>Opposition</h3>
  <div class="grid3">
    <button onclick="opp('Goal')">Goal</button>
    <button onclick="opp('2pt')">2PT</button>
    <button onclick="opp('Point')">1PT</button>
  </div>

  <h3>Quick Events</h3>
  <div class="grid3">
    <button onclick="quick('Won Ball')">Won Ball</button>
    <button onclick="quick('Lost Ball')">Lost Ball</button>
    <button onclick="quick('Mark')">Mark</button>
    <button onclick="wide()">Wide</button>
    <button onclick="quick('Foul Won')">Foul Won</button>
    <button onclick="quick('Foul Conceded')">Foul</button>
  </div>

  <button onclick="undo()">Undo</button>

  <h3>Match Summary</h3>
  <div id="summary"></div>

  <h3 id="last" style="text-align:center;"></h3>

</div>

<script>

let lineup={};
let selected="";
let time=0;
let running=false;
let timer;

let score={g:0,p:0,two:0};
let oppScore={g:0,p:0,two:0};

let stats={shots:0,quick:0,koWon:0,koLost:0,wides:0};

let lastEvent=null;

for(let i=1;i<=15;i++){
  players.innerHTML+=`<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>`;
}

function startMatch(){
  match.style.display="block";

  playerButtons.innerHTML=Object.keys(lineup).map(n=>
    `<button onclick="selected=${n}">${n}</button>`
  ).join("");

  updateScore();
  updateSummary();
}

function add(type){
  if(!selected)return;

  if(type==="Goal"){score.g++;stats.shots++;}
  if(type==="2pt"){score.two++;stats.shots++;}
  if(type==="Point"){score.p++;stats.shots++;}

  lastEvent={type,team:"home"};
  last.innerText="✅ "+lineup[selected]+" - "+type;

  updateScore();updateSummary();
}

function wide(){
  stats.wides++;
  last.innerText="⚪ Wide";
  lastEvent={type:"wide",team:"wide"};
  updateSummary();
}

function quick(type){
  stats.quick++;
  last.innerText="⚡ "+type;
  lastEvent={type,team:"quick"};
  updateSummary();
}

function kickout(t){
  if(t==="won")stats.koWon++;
  if(t==="lost")stats.koLost++;
  last.innerText="⚪ KO "+t;
  lastEvent={type:t,team:"ko"};
  updateSummary();
}

function opp(type){
  if(type==="Goal")oppScore.g++;
  if(type==="2pt")oppScore.two++;
  if(type==="Point")oppScore.p++;
  last.innerText="🔴 Opp - "+type;
  lastEvent={type,team:"opp"};
  updateScore();updateSummary();
}

function undo(){
  if(!lastEvent)return;

  if(lastEvent.team==="home"){
    if(lastEvent.type==="Goal"){score.g--;stats.shots--;}
    if(lastEvent.type==="2pt"){score.two--;stats.shots--;}
    if(lastEvent.type==="Point"){score.p--;stats.shots--;}
  }

  if(lastEvent.team==="wide"){
    stats.wides--;
  }

  updateScore();updateSummary();
}

function updateScore(){
  scoreDiv=document.getElementById("score");
  scoreDiv.textContent=
    home.value+": "+score.g+"-"+(score.p+score.two*2)+
    " | "+away.value+": "+oppScore.g+"-"+(oppScore.p+oppScore.two*2);
}

function updateSummary(){
  let totalKO=stats.koWon+stats.koLost;
  let koPerc=totalKO?((stats.koWon/totalKO)*100).toFixed(1):0;

  summary.innerHTML=
    "Shots: "+stats.shots+"<br>"+
    "Goals: "+score.g+"<br>"+
    "Points: "+score.p+"<br>"+
    "2PT: "+score.two+"<br>"+
    "Wides: "+stats.wides+"<br><br>"+
    "KO Won: "+stats.koWon+"<br>"+
    "KO Lost: "+stats.koLost+"<br>"+
    "KO %: "+koPerc+"%";
}

</script>

</body>
</html>
