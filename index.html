<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAA Stats Elite</title>

<style>
body { font-family: Arial; padding: 10px; }
button, select, input { margin: 5px; padding: 10px; font-size: 15px; }

/* PITCH */
.pitch {
  height: 300px;
  position: relative;
  background: #2e7d32;
  border: 2px solid white;
}

/* halfway line */
.pitch::before {
  content:"";
  position:absolute;
  top:50%;
  width:100%;
  height:2px;
  background:white;
}

/* 45 lines */
.pitch::after {
  content:"";
  position:absolute;
  top:25%;
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.7);
}

.line45b {
  position:absolute;
  top:75%;
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.7);
}

/* LARGE RECTANGLE */
.large-box {
  position:absolute;
  left:25%;
  width:50%;
  height:22%;
  border:2px solid white;
}

.large-top { top:0; }
.large-bottom { bottom:0; }

/* SMALL RECTANGLE */
.small-box {
  position:absolute;
  left:35%;
  width:30%;
  height:10%;
  border:2px solid white;
}

.small-top { top:0; }
.small-bottom { bottom:0; }

/* 40m ARC */
.arc {
  position:absolute;
  left:50%;
  width:120px;
  height:120px;
  border:2px solid white;
  border-radius:50%;
  transform:translateX(-50%);
  border-bottom:none;
}

.arc-top { top:22%; }
.arc-bottom { bottom:22%; transform:translateX(-50%) rotate(180deg); }

/* dots */
.dot { position:absolute; width:8px;height:8px;border-radius:50%; }
.own { background:red; }
.opp { background:yellow; }

</style>
</head>

<body>

<h2 id="teams"></h2>

<div id="setup">
<input id="home" placeholder="Home Team"><br>
<input id="away" placeholder="Opponent"><br>

<h3>Lineup</h3>
<div id="players"></div>

<button onclick="startMatch()">Start Match</button>
</div>

<div id="match" style="display:none">

<h2 id="score">0-0</h2>
<h3 id="oppScore">Opp: 0-0</h3>

<select id="playerSelect">
<option>Select Player</option>
</select>

<!-- FULL PITCH -->
<div class="pitch" id="pitch">

  <div class="large-box large-top"></div>
  <div class="large-box large-bottom"></div>

  <div class="small-box small-top"></div>
  <div class="small-box small-bottom"></div>

  <div class="arc arc-top"></div>
  <div class="arc arc-bottom"></div>

  <div class="line45b"></div>

</div>

<br>

<h3>Own Score</h3>
<button onclick="addScore('goal')">Goal</button>
<button onclick="addScore('two')">2pt</button>

<h3>Opposition Score</h3>
<button onclick="addOppScore('goal')">Goal</button>
<button onclick="addOppScore('two')">2pt</button>

<h3>Kickouts</h3>
<button onclick="kickout('own','won')">Own Won</button>
<button onclick="kickout('own','lost')">Own Lost</button>
<button onclick="kickout('opp','won')">Press Won</button>
<button onclick="kickout('opp','lost')">Press Lost</button>

<br><br>

<label>
<input type="checkbox" id="oppToggle"> Track Opposition Shots
</label>

<br><br>

<button onclick="showStats()">View Stats</button>

</div>

<div id="stats" style="display:none">

<pre id="output"></pre>

<button onclick="back()">Back</button>

</div>

<script>

let lineup = {};
let events = [];
let kickouts = [];

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

const playersDiv = document.getElementById("players");

/* FORMATION */
playersDiv.innerHTML = `
<div style="text-align:center">
<input placeholder="#1" id="p1"><br><br>
<input placeholder="#2"><input placeholder="#3"><input placeholder="#4"><br><br>
<input placeholder="#5" id="p5"><input placeholder="#6"><input placeholder="#7"><br><br>
<input placeholder="#8" id="p8"><input placeholder="#9"><br><br>
<input placeholder="#10"><input placeholder="#11"><input placeholder="#12"><br><br>
<input placeholder="#13"><input placeholder="#14"><input placeholder="#15">
</div>`;

// start
function startMatch(){
  const home = document.getElementById("home").value;
  const away = document.getElementById("away").value;

  document.getElementById("teams").innerText = home+" vs "+away;

  const select = document.getElementById("playerSelect");

  for(let i=1;i<=15;i++){
    let input = document.getElementById("p"+i);
    if(input && input.value){
      lineup[i]=input.value;
      select.innerHTML += `<option value="${i}">${i} ${input.value}</option>`;
    }
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("match").style.display="block";
}

// tap pitch
document.getElementById("pitch").onclick = function(e){

  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let isOpp = document.getElementById("oppToggle").checked;

  const dot = document.createElement("div");
  dot.className = "dot " + (isOpp ? "opp" : "own");
  dot.style.left = x+"px";
  dot.style.top = y+"px";
  e.target.appendChild(dot);

  if(isOpp){
    oppScore.p++;
    updateOppScore();
    events.push({team:"opp", type:"point"});
  } else {
    score.p++;
    updateScore();
    events.push({team:"own", type:"point"});
  }
};

// scoring
function addScore(type){
  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  updateScore();
}

function addOppScore(type){
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  updateOppScore();
}

function updateScore(){
  document.getElementById("score").innerText =
    score.g + "-" + (score.p + score.two*2);
}

function updateOppScore(){
  document.getElementById("oppScore").innerText =
    "Opp: " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

function kickout(team,result){
  kickouts.push({team,result});
}

// stats
function showStats(){

  document.getElementById("match").style.display="none";
  document.getElementById("stats").style.display="block";

  let ownKO = kickouts.filter(k=>k.team==="own");
  let oppKO = kickouts.filter(k=>k.team==="opp");

  let ownPct = ownKO.length ? (ownKO.filter(k=>k.result==="won").length/ownKO.length*100).toFixed(1):0;
  let oppPct = oppKO.length ? (oppKO.filter(k=>k.result==="won").length/oppKO.length*100).toFixed(1):0;

  document.getElementById("output").innerText = 
`Own Score: ${score.g}-${score.p + score.two*2}
Opp Score: ${oppScore.g}-${oppScore.p + oppScore.two*2}

Kickouts:
Own: ${ownPct}%
Press: ${oppPct}%`;
}

function back(){
  document.getElementById("stats").style.display="none";
  document.getElementById("match").style.display="block";
}

</script>

</body>
</html>
