<!DOCTYPE html>
<html>
<head>
  <title>GAA Match Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 10px; }

    button { margin:4px; padding:10px; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

    /* ✅ PITCH */
    #pitch {
      width:100%;
      height:420px;
      background:#2e7d32;
      position:relative;
      border:2px solid white;
      margin-top:10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot {
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      background:red;
    }
  </style>
</head>

<body>

<h2>Match Setup</h2>

<div class="grid2">

  <!-- HOME -->
  <div>
    <h3>Home</h3>
    <input id="home" placeholder="Home Team"><br><br>

    <b>1–15</b>
    <div id="players"></div>

    <b>Subs</b>
    <div id="subs"></div>
  </div>

  <!-- OPP -->
  <div>
    <h3>Opponent</h3>
    <input id="away" placeholder="Opponent"><br><br>

    <b>1–15</b>
    <div id="oppPlayers"></div>

    <b>Subs</b>
    <div id="oppSubs"></div>
  </div>

</div>

<br>
<button onclick="startMatch()" style="width:100%">Start Match</button>

<hr>

<!-- MATCH VIEW -->
<div id="match" style="display:none;">

  <div id="score" style="font-weight:bold"></div>

  <h2 id="timer">1st Half – 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="toggleHalf()">Second Half</button>

  <h3>Select Player</h3>
  <div id="playerButtons"></div>
  <button onclick="startSub()">SUB</button>

  <h3>Select Opp Player (optional)</h3>
  <div id="oppButtons"></div>

  <h4 id="selected"></h4>

  <!-- ✅ PITCH BACK -->
  <h3>Pitch</h3>
  <div id="pitch" onclick="logShot(event)">

    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:36%;width:28%;height:10%;"></div>
    <div class="box" style="top:0;left:25%;width:50%;height:15%;"></div>

    <div class="line" style="top:15%;"></div>
    <div class="line" style="top:25%;"></div>

    <svg style="position:absolute; top:25%; left:0; width:100%; height:55%;"
         viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M5,0 Q50,80 95,0"
            stroke="white" stroke-width="1.5" fill="none"/>
    </svg>

    <div class="line" style="top:70%;"></div>
    <div class="line" style="top:88%;"></div>

  </div>

  <!-- HOME -->
  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <!-- KICKOUT -->
  <h3>Kickouts</h3>
  <div class="grid2">
    <button onclick="kickout('won')">KO Won</button>
    <button onclick="kickout('lost')">KO Lost</button>
  </div>

  <!-- OPP -->
  <h3>Opposition</h3>
  <div class="grid2">
    <button onclick="oppScoreAdd('Goal')">Goal</button>
    <button onclick="oppScoreAdd('2pt')">2PT</button>
    <button onclick="oppScoreAdd('Point')">1PT</button>
    <button onclick="oppWide()">Wide</button>
  </div>

  <h3 id="last"></h3>

</div>

<script>

// DATA
let lineup = {};
let oppLineup = {};

let selected = "";
let selectedOpp = "";

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

let subMode=false;
let subOff=null;

let half="1st Half";
let time=0;
let running=false;
let interval;

/* INPUT SETUP */
for(let i=1;i<=30;i++){
  if(i<=15){
    players.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>`;
    oppPlayers.innerHTML += `<input placeholder="Opp #${i}" onchange="oppLineup[${i}] = this.value"><br>`;
  } else {
    subs.innerHTML += `<input placeholder="#${i}" onchange="lineup[${i}] = this.value"><br>`;
    oppSubs.innerHTML += `<input placeholder="Opp #${i}" onchange="oppLineup[${i}] = this.value"><br>`;
  }
}

/* BUILD BUTTONS */
function buildButtons(){

  let html="";
  for(let i=1;i<=30;i++){
    let disabled = i>15;
    html += `<button onclick="selectPlayer(${i})" ${disabled?'disabled':''}>${i}</button>`;
  }
  playerButtons.innerHTML = html;

  let oppHtml="";
  for(let i=1;i<=30;i++){
    oppHtml += `<button onclick="selectOpp(${i})">${i}</button>`;
  }
  oppButtons.innerHTML = oppHtml;
}

/* START */
function startMatch(){
  match.style.display="block";
  buildButtons();
  updateScore();
}

/* TIMER */
function startTimer(){
  if(running)return;
  running=true;
  interval=setInterval(()=>{
    time++;
    let m=Math.floor(time/60).toString().padStart(2,"0");
    let s=(time%60).toString().padStart(2,"0");
    timer.innerText=half+" – "+m+":"+s;
  },1000);
}

function pauseTimer(){
  running=false;
  clearInterval(interval);
}

function toggleHalf(){
  half="2nd Half";
  time=0;
}

/* TIME */
function now(){
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  return `${half} ${m}:${s}`;
}

/* SUB */
function startSub(){
  subMode=true;
  subOff=null;
  last.innerText="Select player OFF";
}

function selectPlayer(n){

  if(subMode){
    if(!subOff){ subOff=n; last.innerText="Select player ON"; return; }

    let offBtn=document.querySelector(`button[onclick="selectPlayer(${subOff})"]`);
    let onBtn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);

    if(offBtn){ offBtn.disabled=true; offBtn.style.background="#ccc"; }
    if(onBtn){ onBtn.disabled=false; }

    last.innerText=`🔁 ${now()} – #${subOff} OFF → #${n} ON`;

    subMode=false;
    return;
  }

  let btn=document.querySelector(`button[onclick="selectPlayer(${n})"]`);
  if(btn && btn.disabled)return;

  selected=n;
  let name=lineup[n];
  selectedDisplay.innerText=name?`#${n} - ${name}`:`#${n}`;
}

/* OPP SELECT */
function selectOpp(n){
  selectedOpp=n;
}

/* HOME */
function add(type){
  if(!selected)return;

  let name=lineup[selected]||("#"+selected);

  if(type==="Goal")score.g++;
  if(type==="2pt")score.two++;
  if(type==="Point")score.p++;

  last.innerText=`✅ ${now()} – ${name} - ${type}`;
  updateScore();
}

/* OPP */
function oppScoreAdd(type){
  let name = selectedOpp ? (oppLineup[selectedOpp]||("#"+selectedOpp)) : "Opp";

  if(type==="Goal")oppScore.g++;
  if(type==="2pt")oppScore.two++;
  if(type==="Point")oppScore.p++;

  last.innerText=`🔴 ${now()} – ${name} - ${type}`;
  selectedOpp="";
  updateScore();
}

function oppWide(){
  let name = selectedOpp ? (oppLineup[selectedOpp]||("#"+selectedOpp)) : "Opp";
  last.innerText=`🔴 ${now()} – ${name} - Wide`;
  selectedOpp="";
}

/* SCORE */
function updateScore(){
  document.getElementById("score").innerText =
    home.value+": "+score.g+"-"+(score.p+score.two*2)
    +" | "+
    away.value+": "+oppScore.g+"-"+(oppScore.p+oppScore.two*2);
}

/* ✅ SHOT TRACKING */
function logShot(e){
  if(!selected) return;

  let rect=document.getElementById("pitch").getBoundingClientRect();

  let x=e.clientX-rect.left;
  let y=e.clientY-rect.top;

  let dot=document.createElement("div");
  dot.className="dot";
  dot.style.left=x+"px";
  dot.style.top=y+"px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
