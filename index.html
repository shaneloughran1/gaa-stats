<!DOCTYPE html>
<html>
<head>
  <title>GAA Stats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding:10px; }

    button { margin:4px; padding:10px; }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

    /* ✅ PITCH */
    #pitch {
      width:100%;
      height:400px;
      background:#2e7d32;
      position:relative;
      border:2px solid white;
      margin-top:10px;
    }

    .line { position:absolute;width:100%;height:2px;background:white; }
    .box { position:absolute;border:2px solid white; }

    .dot {
      position:absolute;
      width:8px;height:8px;
      border-radius:50%;
      background:red;
    }

  </style>
</head>

<body>

<h2>Match Setup</h2>

<div class="grid2">

  <div>
    <b>Home</b><br>
    <input id="home" placeholder="Home"><br><br>
    <div id="players"></div>
    <div id="subs"></div>
  </div>

  <div>
    <b>Opp</b><br>
    <input id="away" placeholder="Opp"><br><br>
    <div id="oppPlayers"></div>
    <div id="oppSubs"></div>
  </div>

</div>

<button onclick="startMatch()">Start Match</button>

<hr>

<div id="match" style="display:none;">

  <h3 id="score"></h3>

  <h2 id="timer">1st Half – 00:00</h2>

  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="toggleHalf()">Second Half</button>

  <h3>Players</h3>
  <div id="playerButtons"></div>
  <button onclick="startSub()">SUB</button>

  <h3>Opp Players</h3>
  <div id="oppButtons"></div>

  <!-- ✅ PITCH BACK -->
  <div id="pitch" onclick="logShot(event)">
    <div class="line" style="top:0;"></div>
    <div class="box" style="top:0;left:30%;width:40%;height:15%;"></div>

    <div class="line" style="top:25%;"></div>
    <div class="line" style="top:50%;"></div>
    <div class="line" style="top:75%;"></div>
  </div>

  <!-- HOME -->
  <h3>Home</h3>
  <div class="grid3">
    <button onclick="add('Goal')">Goal</button>
    <button onclick="add('2pt')">2PT</button>
    <button onclick="add('Point')">1PT</button>
  </div>

  <!-- OPP -->
  <h3>Opp</h3>
  <div class="grid2">
    <button onclick="oppAdd('Goal')">Goal</button>
    <button onclick="oppAdd('2pt')">2PT</button>
    <button onclick="oppAdd('Point')">1PT</button>
    <button onclick="oppWide()">Wide</button>
  </div>

  <!-- ✅ SUMMARY BACK -->
  <h3>Summary</h3>
  <div id="summary"></div>

  <h3 id="last"></h3>

</div>

<script>

let lineup = {};
let oppLineup = {};

let selected="";
let selectedOpp="";

let score={g:0,p:0,two:0};
let oppScore={g:0,p:0,two:0};

let stats={shots:0,wides:0};

let half="1st Half";
let time=0;
let running=false;
let timerInt;

let subMode=false;
let subOff=null;

/* INPUT BUILD */
for(let i=1;i<=30;i++){
  if(i<=15){
    players.innerHTML+=`<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>`;
    oppPlayers.innerHTML+=`<input placeholder="Opp #${i}" onchange="oppLineup[${i}]=this.value"><br>`;
  }else{
    subs.innerHTML+=`<input placeholder="#${i}" onchange="lineup[${i}]=this.value"><br>`;
    oppSubs.innerHTML+=`<input placeholder="Opp #${i}" onchange="oppLineup[${i}]=this.value"><br>`;
  }
}

/* START */
function startMatch(){
  match.style.display="block";

  let btns="";
  for(let i=1;i<=30;i++){
    let dis=i>15?"disabled":"";
    btns+=`<button onclick="selectPlayer(${i})" ${dis}>${i}</button>`;
  }
  playerButtons.innerHTML=btns;

  let oppBtns="";
  for(let i=1;i<=30;i++){
    oppBtns+=`<button onclick="selectOpp(${i})">${i}</button>`;
  }
  oppButtons.innerHTML=oppBtns;

  updateScore(); updateSummary();
}

/* TIMER */
function startTimer(){
  if(running)return;
  running=true;
  timerInt=setInterval(()=>{
    time++;
    let m=Math.floor(time/60).toString().padStart(2,"0");
    let s=(time%60).toString().padStart(2,"0");
    timer.innerText=half+" – "+m+":"+s;
  },1000);
}
function pauseTimer(){ running=false; clearInterval(timerInt); }
function toggleHalf(){ half="2nd Half"; time=0; }

function now(){
  let m=Math.floor(time/60).toString().padStart(2,"0");
  let s=(time%60).toString().padStart(2,"0");
  return `${half} ${m}:${s}`;
}

/* SELECT */
function selectPlayer(n){
  if(subMode){
    if(!subOff){ subOff=n; last.innerText="Select ON"; return; }
    last.innerText=`SUB ${subOff} -> ${n}`;
    subMode=false; return;
  }
  selected=n;
}

function selectOpp(n){ selectedOpp=n; }

/* SCORE */
function add(t){
  if(!selected)return;

  stats.shots++;

  if(t==="Goal")score.g++;
  if(t==="2pt")score.two++;
  if(t==="Point")score.p++;

  last.innerText=`✅ ${now()} #${selected} ${t}`;
  updateScore(); updateSummary();
}

function oppAdd(t){
  if(t==="Goal")oppScore.g++;
  if(t==="2pt")oppScore.two++;
  if(t==="Point")oppScore.p++;

  last.innerText=`🔴 ${now()} Opp ${t}`;
  updateScore();
}

function oppWide(){
  stats.wides++;
  last.innerText=`🔴 ${now()} Opp Wide`;
  updateSummary();
}

/* SCORE DISPLAY */
function updateScore(){
  score.innerText =
    home.value+": "+score.g+"-"+(score.p+score.two*2)
    +" | "+
    away.value+": "+oppScore.g+"-"+(oppScore.p+oppScore.two*2);
}

/* SUMMARY */
function updateSummary(){
  summary.innerText =
    "Shots: "+stats.shots +
    " | Wides: "+stats.wides;
}

/* SHOTS */
function logShot(e){
  if(!selected)return;

  let rect=pitch.getBoundingClientRect();
  let dot=document.createElement("div");

  dot.className="dot";
  dot.style.left=(e.clientX-rect.left)+"px";
  dot.style.top=(e.clientY-rect.top)+"px";

  pitch.appendChild(dot);
}

</script>

</body>
</html>
