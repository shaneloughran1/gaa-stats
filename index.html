<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GAA Half Pitch Accurate</title>

<style>
body { font-family: Arial; padding: 10px; }
button { margin: 5px; padding: 10px; }

/* PITCH */
.pitch {
  height: 360px;
  width: 100%;
  background: #2e7d32;
  position: relative;
  border: 2px solid white;
}

/* SIDELINES */
.pitch::before,
.pitch::after {
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:white;
}
.pitch::before { left:0; }
.pitch::after { right:0; }

/* END LINE */
.end-line {
  position:absolute;
  top:0;
  width:100%;
  height:2px;
  background:white;
}

/* SMALL BOX */
.small-box {
  position:absolute;
  top:0;
  left:36%;
  width:28%;
  height:10%;
  border:2px solid white;
}

/* LARGE BOX (13m zone) */
.large-box {
  position:absolute;
  top:0;
  left:25%;
  width:50%;
  height:16%;
  border:2px solid white;
}

/* ✅ 13m LINE */
.line13 {
  position:absolute;
  top:16%;
  width:100%;
  height:2px;
  background:white;
}

/* ✅ 21m LINE */
.line21 {
  position:absolute;
  top:24%;
  width:100%;
  height:2px;
  background:white;
}

/* ✅ 21m ARC */
.arc21 {
  position:absolute;
  top:24%;
  left:50%;
  width:38%;
  height:70px;
  border:2px solid white;
  border-top:none;
  border-radius:0 0 50% 50% / 0 0 100% 100%;
  transform:translateX(-50%);
}

/* ✅ 2PT ARC */
.arc2pt {
  position:absolute;
  top:24%;
  left:50%;
  width:75%;
  height:110px;
  border:2px solid white;
  border-top:none;
  border-radius:0 0 50% 50% / 0 0 100% 100%;
  transform:translateX(-50%);
}

/* ✅ FIXED 45m LINE (CLOSE TO ARC) */
.line45 {
  position:absolute;
  top:43%;
  width:100%;
  height:2px;
  background:white;
}

/* ✅ 65m LINE */
.line65 {
  position:absolute;
  top:65%;
  width:100%;
  height:2px;
  background:white;
}

/* dots */
.dot {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
}
.own { background:red; }
.opp { background:yellow; }

</style>
</head>

<body>

<h3 id="score">0-0</h3>
<h4 id="oppScore">Opp: 0-0</h4>

<div class="pitch" id="pitch">

  <div class="end-line"></div>

  <div class="small-box"></div>
  <div class="large-box"></div>

  <div class="line13"></div>
  <div class="line21"></div>

  <div class="arc21"></div>
  <div class="arc2pt"></div>

  <div class="line45"></div>
  <div class="line65"></div>

</div>

<br>

<h4>Own Score</h4>
<button onclick="addScore('point')">1pt</button>
<button onclick="addScore('goal')">Goal</button>
<button onclick="addScore('two')">2pt</button>

<h4>Opposition Score</h4>
<button onclick="addOppScore('point')">1pt</button>
<button onclick="addOppScore('goal')">Goal</button>
<button onclick="addOppScore('two')">2pt</button>

<br><br>

<label>
<input type="checkbox" id="oppToggle"> Track Opposition Shots
</label>

<script>

let score = {g:0,p:0,two:0};
let oppScore = {g:0,p:0,two:0};

document.getElementById("pitch").onclick = function(e){

  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const isOpp = document.getElementById("oppToggle").checked;

  const dot = document.createElement("div");
  dot.className = "dot " + (isOpp ? "opp" : "own");
  dot.style.left = x+"px";
  dot.style.top = y+"px";
  e.target.appendChild(dot);

  if(isOpp){
    oppScore.p++;
    updateOpp();
  } else {
    score.p++;
    updateScore();
  }
};

function addScore(type){
  if(type==="point") score.p++;
  if(type==="goal") score.g++;
  if(type==="two") score.two++;
  updateScore();
}

function addOppScore(type){
  if(type==="point") oppScore.p++;
  if(type==="goal") oppScore.g++;
  if(type==="two") oppScore.two++;
  updateOpp();
}

function updateScore(){
  document.getElementById("score").innerText =
    score.g + "-" + (score.p + score.two*2);
}

function updateOpp(){
  document.getElementById("oppScore").innerText =
    "Opp: " + oppScore.g + "-" + (oppScore.p + oppScore.two*2);
}

</script>

</body>
</html>
